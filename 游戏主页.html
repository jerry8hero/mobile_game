<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=mobile_game_handheld/src/index.html">
    <title>🎮 掌机游戏厅</title>
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
        }
        .logo { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 28px; margin-bottom: 10px; }
        p { color: #a0a0a0; }
        .loading {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(233, 69, 96, 0.3);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="logo">🎮</div>
    <h1>正在跳转到掌机游戏厅...</h1>
    <div class="loading"></div>
    <p>如果没有自动跳转，<a href="mobile_game_handheld/src/index.html" style="color:#e94560;">点击这里进入</a></p>
</body>
</html>
