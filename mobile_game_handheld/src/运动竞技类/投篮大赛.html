<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>投篮大赛</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #a18cd1 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            overflow: hidden;
        }
        h1 { color: #fff; font-size: 1.8rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        .info-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }
        .info-item {
            background: rgba(255,255,255,0.9);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1rem;
        }

        .game-area {
            position: relative;
            width: 100%;
            max-width: 380px;
            height: 450px;
            background: linear-gradient(180deg, #2d3436 0%, #636e72 30%, #b2bec3 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .hoop {
            position: absolute;
            top: 80px;
            right: 30px;
            font-size: 4rem;
            z-index: 5;
        }

        .backboard {
            position: absolute;
            top: 60px;
            right: 20px;
            width: 80px;
            height: 100px;
            background: linear-gradient(180deg, #fff, #dfe6e9);
            border: 4px solid #b2bec3;
            border-radius: 5px;
            z-index: 4;
        }

        .ball {
            position: absolute;
            font-size: 2.5rem;
            z-index: 10;
            transition: none;
        }

        .player {
            position: absolute;
            bottom: 20px;
            left: 40px;
            font-size: 4rem;
            z-index: 6;
            animation: idle 1s ease-in-out infinite;
        }
        @keyframes idle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .power-bar-container {
            position: absolute;
            bottom: 100px;
            left: 20px;
            width: 30px;
            height: 150px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            overflow: hidden;
            z-index: 20;
        }

        .power-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(0deg, #00b894 0%, #feca57 50%, #ff6b6b 100%);
            transition: height 0.1s;
            border-radius: 15px;
        }

        .power-indicator {
            position: absolute;
            bottom: 260px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            z-index: 20;
        }

        .angle-indicator {
            position: absolute;
            bottom: 230px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            z-index: 20;
        }

        .aim-line {
            position: absolute;
            bottom: 120px;
            left: 80px;
            width: 0;
            height: 3px;
            background: rgba(255,255,255,0.5);
            transform-origin: left center;
            z-index: 3;
            display: none;
        }

        .score-popup {
            position: absolute;
            font-size: 2rem;
            font-weight: bold;
            color: #feca57;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 30;
            animation: scoreFloat 1s ease forwards;
            pointer-events: none;
        }
        @keyframes scoreFloat {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            50% { transform: translateY(-30px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }

        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .start-overlay h2 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .start-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #e17055, #fab1a0);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(225,112,85,0.4);
        }

        .instructions {
            margin-top: 15px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.8);
            border-radius: 15px;
            font-size: 0.85rem;
            text-align: center;
        }

        @media (max-width: 767px) {
            h1 { font-size: 1.4rem; }
            .game-area { height: 400px; }
            .player { font-size: 3rem; }
            .hoop { font-size: 3rem; top: 60px; }
            .backboard { width: 60px; height: 80px; }
        }
    </style>
</head>
<body>
    <h1>🏀 投篮大赛</h1>

    <div class="info-bar">
        <div class="info-item">⭐ 得分: <span id="score">0</span></div>
        <div class="info-item">🎯 投篮: <span id="shots">0</span></div>
    </div>

    <div class="game-area" id="gameArea">
        <div class="backboard"></div>
        <div class="hoop" id="hoop">🏀</div>
        <div class="player" id="player">🏀</div>
        <div class="power-bar-container">
            <div class="power-bar" id="powerBar"></div>
        </div>
        <div class="power-indicator">力度: <span id="powerValue">0</span>%</div>
        <div class="angle-indicator">角度: <span id="angleValue">45</span>°</div>
        <div class="aim-line" id="aimLine"></div>

        <div class="start-overlay" id="startOverlay">
            <h2>🏀 投篮大赛</h2>
            <button class="start-btn" onclick="startGame()">开始游戏</button>
        </div>
    </div>

    <div class="instructions">长按蓄力，松开投篮！调整角度获得更高分数！</div>

    <script>
        const gameArea = document.getElementById('gameArea');
        const player = document.getElementById('player');
        const hoop = document.getElementById('hoop');
        const powerBar = document.getElementById('powerBar');
        const powerValue = document.getElementById('powerValue');
        const angleValue = document.getElementById('angleValue');
        const aimLine = document.getElementById('aimLine');
        const startOverlay = document.getElementById('startOverlay');

        let score = 0;
        let shots = 0;
        let gameRunning = false;
        let isCharging = false;
        let power = 0;
        let angle = 45;
        let chargeDirection = 1;
        let ball = null;
        let animationId = null;

        function startGame() {
            gameRunning = true;
            score = 0;
            shots = 0;
            startOverlay.style.display = 'none';
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('shots').textContent = shots;
        }

        function startCharge() {
            if (!gameRunning || ball) return;
            isCharging = true;
            power = 0;
            chargeDirection = 1;
            chargePower();
        }

        function chargePower() {
            if (!isCharging) return;

            power += 2 * chargeDirection;
            if (power >= 100) {
                power = 100;
                chargeDirection = -1;
            } else if (power <= 0) {
                power = 0;
                chargeDirection = 1;
            }

            powerBar.style.height = power + '%';
            powerValue.textContent = Math.round(power);

            animationId = requestAnimationFrame(chargePower);
        }

        function releaseCharge() {
            if (!isCharging || !gameRunning) return;
            isCharging = false;
            cancelAnimationFrame(animationId);
            shoot();
        }

        function shoot() {
            shots++;
            updateDisplay();

            // 创建篮球
            ball = document.createElement('div');
            ball.className = 'ball';
            ball.textContent = '🏀';
            ball.style.left = '80px';
            ball.style.bottom = '60px';
            gameArea.appendChild(ball);

            // 投篮动画
            const startX = 80;
            const startY = 60;
            const endX = 300;
            const endY = 350;
            const duration = 1000;
            const startTime = performance.now();

            // 随机成功率
            const successChance = power * 0.01 + (angle - 30) * 0.005;

            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // 抛物线
                const x = startX + (endX - startX) * progress;
                const y = startY + (endY - startY) * progress - Math.sin(progress * Math.PI) * 200 * (power / 100);

                ball.style.left = x + 'px';
                ball.style.bottom = y + 'px';

                // 旋转篮球
                ball.style.transform = `rotate(${progress * 720}deg)`;

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // 投篮结束
                    ball.remove();
                    ball = null;

                    // 判断是否进球
                    const isGoal = Math.random() < successChance && power > 30 && power < 90;

                    if (isGoal) {
                        // 进球！
                        const points = power > 80 ? 3 : (power > 50 ? 2 : 1);
                        score += points;
                        showScore(`+${points}`, 380, 120);
                        hoop.textContent = '🎉';
                    } else {
                        showScore('Miss!', 300, 200);
                        hoop.textContent = '😢';
                    }

                    updateDisplay();

                    setTimeout(() => {
                        hoop.textContent = '🏀';
                    }, 1000);
                }
            }

            requestAnimationFrame(animate);
        }

        function showScore(text, x, y) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = text;
            popup.style.left = x + 'px';
            popup.style.bottom = y + 'px';
            gameArea.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        function changeAngle(delta) {
            if (!gameRunning || ball) return;
            angle = Math.max(20, Math.min(70, angle + delta));
            angleValue.textContent = angle;
        }

        // 事件监听
        gameArea.addEventListener('mousedown', startCharge);
        gameArea.addEventListener('mouseup', releaseCharge);
        gameArea.addEventListener('mouseleave', () => {
            if (isCharging) releaseCharge();
        });

        gameArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startCharge();
        }, { passive: false });

        gameArea.addEventListener('touchend', (e) => {
            e.preventDefault();
            releaseCharge();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') changeAngle(5);
            if (e.key === 'ArrowDown') changeAngle(-5);
        });
    </script>
<script src="../gamepad-helper.js"></script>
</body>
</html>
