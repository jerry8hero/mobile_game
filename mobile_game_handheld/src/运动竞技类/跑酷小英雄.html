<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>跑酷小英雄</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            overflow: hidden;
        }
        h1 { color: #fff; font-size: 1.8rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        .info-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }
        .info-item {
            background: rgba(255,255,255,0.9);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1rem;
        }

        .game-area {
            position: relative;
            width: 100%;
            max-width: 380px;
            height: 450px;
            background: linear-gradient(180deg, #74b9ff 0%, #0984e3 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .track {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(180deg, #636e72, #2d3436);
        }

        .lane {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 10px;
            background: repeating-linear-gradient(90deg, #feca57 0px, #feca57 30px, transparent 30px, transparent 60px);
            animation: moveLane 0.5s linear infinite;
        }
        @keyframes moveLane {
            from { background-position: 0 0; }
            to { background-position: 60px 0; }
        }

        .player {
            position: absolute;
            bottom: 60px;
            left: 50px;
            font-size: 2.5rem;
            transition: bottom 0.2s;
            z-index: 10;
            animation: run 0.3s steps(2) infinite;
        }
        @keyframes run {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .player.jump {
            animation: jump 0.6s ease;
        }
        @keyframes jump {
            0% { bottom: 60px; }
            50% { bottom: 180px; }
            100% { bottom: 60px; }
        }

        .obstacle {
            position: absolute;
            bottom: 60px;
            font-size: 2rem;
            z-index: 5;
            animation: moveObstacle 3s linear infinite;
        }
        @keyframes moveObstacle {
            from { left: 400px; }
            to { left: -50px; }
        }

        .coin {
            position: absolute;
            font-size: 1.8rem;
            z-index: 5;
            animation: moveCoin 3s linear infinite;
        }
        @keyframes moveCoin {
            from { left: 400px; }
            to { left: -50px; }
        }

        .score-popup {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: #feca57;
            animation: popUp 0.8s ease forwards;
            z-index: 20;
            pointer-events: none;
        }
        @keyframes popUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .start-overlay h2 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .start-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #00b894, #55efc4);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(0,184,148,0.4);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .game-over-overlay h2 {
            color: #ff6b6b;
            font-size: 2rem;
            margin-bottom: 15px;
        }
        .game-over-overlay p {
            color: #fff;
            font-size: 1.3rem;
            margin-bottom: 20px;
        }

        .instructions {
            margin-top: 15px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.8);
            border-radius: 15px;
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 767px) {
            h1 { font-size: 1.4rem; }
            .game-area { height: 400px; }
            .player { font-size: 2rem; }
            .obstacle { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <h1>🏃 跑酷小英雄</h1>

    <div class="info-bar">
        <div class="info-item">⭐ 得分: <span id="score">0</span></div>
        <div class="info-item">❤️ 生命: <span id="lives">❤️❤️❤️</span></div>
    </div>

    <div class="game-area" id="gameArea">
        <div class="track">
            <div class="lane"></div>
        </div>
        <div class="player" id="player">🏃</div>

        <div class="start-overlay" id="startOverlay">
            <h2>🏃 跑酷小英雄</h2>
            <button class="start-btn" onclick="startGame()">开始游戏</button>
        </div>

        <div class="game-over-overlay" id="gameOverOverlay">
            <h2>💥 游戏结束!</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button class="start-btn" onclick="restartGame()">再来一次</button>
        </div>
    </div>

    <div class="instructions">👆 点击屏幕或按空格键跳跃，躲避障碍物！</div>

    <script>
        const player = document.getElementById('player');
        const gameArea = document.getElementById('gameArea');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');

        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let isJumping = false;
        let obstacles = [];
        let coins = [];
        let speed = 5;

        const obstacleEmojis = ['🚧', '🪨', '🌵', '🚪', '🗑️'];
        const coinEmojis = ['💰', '💎', '⭐', '🌟'];

        function startGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            speed = 5;
            startOverlay.style.display = 'none';
            gameOverOverlay.style.display = 'none';
            updateDisplay();
            spawnObjects();
        }

        function restartGame() {
            // 清除所有障碍物和金币
            obstacles.forEach(o => o.remove());
            coins.forEach(c => c.remove());
            obstacles = [];
            coins = [];
            startGame();
        }

        function updateDisplay() {
            document.getElementById('score').textContent = score;
            let hearts = '';
            for (let i = 0; i < lives; i++) hearts += '❤️';
            for (let i = lives; i < 3; i++) hearts += '🖤';
            document.getElementById('lives').textContent = hearts;
        }

        function jump() {
            if (!gameRunning || isJumping) return;
            isJumping = true;
            player.classList.add('jump');

            setTimeout(() => {
                player.classList.remove('jump');
                isJumping = false;
            }, 600);
        }

        function spawnObjects() {
            if (!gameRunning) return;

            // 生成障碍物
            if (Math.random() < 0.03) {
                createObstacle();
            }

            // 生成金币
            if (Math.random() < 0.05) {
                createCoin();
            }

            // 加速
            if (score > 0 && score % 100 === 0) {
                speed = Math.min(12, speed + 0.5);
            }

            checkCollisions();
            requestAnimationFrame(spawnObjects);
        }

        function createObstacle() {
            const obs = document.createElement('div');
            obs.className = 'obstacle';
            obs.textContent = obstacleEmojis[Math.floor(Math.random() * obstacleEmojis.length)];
            obs.style.left = '400px';
            obs.style.bottom = (50 + Math.random() * 40) + 'px';
            gameArea.appendChild(obs);
            obstacles.push(obs);
        }

        function createCoin() {
            const coin = document.createElement('div');
            coin.className = 'coin';
            coin.textContent = coinEmojis[Math.floor(Math.random() * coinEmojis.length)];
            coin.style.left = '400px';
            coin.style.bottom = (100 + Math.random() * 100) + 'px';
            gameArea.appendChild(coin);
            coins.push(coin);
        }

        function checkCollisions() {
            const playerRect = {
                left: 50,
                right: 90,
                bottom: parseInt(window.getComputedStyle(player).bottom) || 60,
                top: (parseInt(window.getComputedStyle(player).bottom) || 60) + 50
            };

            // 检查障碍物碰撞
            obstacles.forEach((obs, index) => {
                let left = parseInt(obs.style.left) || 400;
                left -= speed;
                obs.style.left = left + 'px';

                const obsBottom = parseInt(obs.style.bottom) || 60;

                if (left < 100 && left > 40 && Math.abs(obsBottom - playerRect.bottom) < 50) {
                    if (!isJumping) {
                        lives--;
                        updateDisplay();
                        showScorePopup('💥', 50);
                        obs.remove();
                        obstacles.splice(index, 1);

                        if (lives <= 0) {
                            gameOver();
                        }
                    }
                }

                if (left < -50) {
                    obs.remove();
                    obstacles.splice(index, 1);
                    score += 10;
                    updateDisplay();
                }
            });

            // 检查金币收集
            coins.forEach((coin, index) => {
                let left = parseInt(coin.style.left) || 400;
                left -= speed;
                coin.style.left = left + 'px';

                const coinBottom = parseInt(coin.style.bottom) || 150;

                if (left < 100 && left > 40 && Math.abs(coinBottom - playerRect.bottom) < 50) {
                    const points = coin.textContent === '💎' ? 50 : 20;
                    score += points;
                    showScorePopup(coin.textContent, coinBottom);
                    updateDisplay();
                    coin.remove();
                    coins.splice(index, 1);
                }

                if (left < -50) {
                    coin.remove();
                    coins.splice(index, 1);
                }
            });
        }

        function showScorePopup(emoji, bottom) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = emoji;
            popup.style.left = '60px';
            popup.style.bottom = (bottom + 30) + 'px';
            gameArea.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            gameOverOverlay.style.display = 'flex';
        }

        // 事件监听
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        gameArea.addEventListener('click', jump);
        gameArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        }, { passive: false });
    </script>
<script src="../gamepad-helper.js"></script>
<script src="../switch-controls.js"></script>
</body>
</html>
