<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>节奏大师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #111;
            min-height: 100vh;
            overflow: hidden;
        }
        #game {
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            position: relative;
        }
        #track {
            height: 100%;
            background: linear-gradient(180deg, #222 0%, #333 100%);
            position: relative;
            overflow: hidden;
        }
        .lane {
            position: absolute;
            width: 25%;
            height: 100%;
            top: 0;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .lane:nth-child(1) { left: 0; }
        .lane:nth-child(2) { left: 25%; }
        .lane:nth-child(3) { left: 50%; }
        .lane:nth-child(4) { left: 75%; }
        .lane-label {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            opacity: 0.5;
        }
        .hit-zone {
            position: absolute;
            bottom: 50px;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(255,255,255,0.1);
            display: flex;
        }
        .hit-zone .lane {
            border-right: 2px solid rgba(255,255,255,0.3);
        }
        .note {
            position: absolute;
            width: 20%;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            transition: transform 0.1s;
        }
        .note.perfect { background: linear-gradient(180deg, #feca57, #ff9f43); }
        .note.good { background: linear-gradient(180deg, #4ecdc4, #26de81); }
        .note.miss { background: linear-gradient(180deg, #e74c3c, #c0392b); }
        .hit-effect {
            position: absolute;
            bottom: 50px;
            font-size: 2rem;
            font-weight: bold;
            animation: fadeUp 0.5s forwards;
            left: 25%;
            width: 50%;
            text-align: center;
        }
        @keyframes fadeUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 1.1rem;
            z-index: 10;
        }
        #score { color: #feca57; }
        #combo { color: #4ecdc4; }
        #accuracy { color: #e94560; }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 20;
        }
        #gameOverScreen { display: none; }
        h1 { font-size: 2rem; color: #e94560; margin-bottom: 15px; }
        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
        }
        .keys-hint {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .key {
            width: 50px;
            height: 50px;
            background: #333;
            border: 2px solid #4ecdc4;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .key.active { background: #4ecdc4; }
    </style>
</head>
<body>
    <div id="game">
        <div id="ui">
            <div>得分: <span id="score">0</span></div>
            <div>连击: <span id="combo">0</span></div>
            <div>准确率: <span id="accuracy">100%</span></div>
        </div>
        <div id="track">
            <div class="lane"><div class="lane-label">D</div></div>
            <div class="lane"><div class="lane-label">F</div></div>
            <div class="lane"><div class="lane-label">J</div></div>
            <div class="lane"><div class="lane-label">K</div></div>
            <div class="hit-zone">
                <div class="lane"></div>
                <div class="lane"></div>
                <div class="lane"></div>
                <div class="lane"></div>
            </div>
        </div>
        <div class="keys-hint">
            <div class="key" id="keyD">D</div>
            <div class="key" id="keyF">F</div>
            <div class="key" id="keyJ">J</div>
            <div class="key" id="keyK">K</div>
        </div>
        <div id="startScreen">
            <h1>🎵 节奏大师</h1>
            <button class="btn" onclick="startGame()">开始游戏</button>
            <p>使用 D F J K 或 点击音符</p>
        </div>
        <div id="gameOverScreen">
            <h1>🎤 游戏结束</h1>
            <p>最终得分: <span id="finalScore">0</span></p>
            <p>准确率: <span id="finalAccuracy">0%</span></p>
            <button class="btn" onclick="restartGame()">再来一次</button>
        </div>
    </div>
    <script src="../gamepad-helper.js"></script>
    <script>
        const keys = ['d', 'f', 'j', 'k'];
        const keyElements = {
            'd': document.getElementById('keyD'),
            'f': document.getElementById('keyF'),
            'j': document.getElementById('keyJ'),
            'k': document.getElementById('keyK')
        };
        const track = document.getElementById('track');

        let gameRunning = false;
        let score = 0;
        let combo = 0;
        let totalNotes = 0;
        let hitNotes = 0;
        let notes = [];
        let gameTime = 0;
        let lastSpawnTime = 0;

        const NOTES = ['🎵', '🎶', '🎸', '🥁', '🎹', '🎤'];
        const SPEED = 3;
        const SPAWN_INTERVAL = 600;

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            combo = 0;
            totalNotes = 0;
            hitNotes = 0;
            notes = [];
            gameTime = 0;
            lastSpawnTime = 0;
            updateUI();
            gameLoop();
        }

        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            startGame();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            const acc = totalNotes > 0 ? Math.round(hitNotes / totalNotes * 100) : 0;
            document.getElementById('finalAccuracy').textContent = acc + '%';
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function spawnNote() {
            const lane = Math.floor(Math.random() * 4);
            const note = {
                lane: lane,
                y: -40,
                key: keys[lane],
                hit: false,
                icon: NOTES[Math.floor(Math.random() * NOTES.length)]
            };

            const el = document.createElement('div');
            el.className = 'note perfect';
            el.textContent = note.icon;
            el.style.left = (lane * 25 + 2.5) + '%';
            el.style.top = '-40px';
            note.element = el;
            track.appendChild(el);

            notes.push(note);
            totalNotes++;
        }

        function update() {
            if (!gameRunning) return;

            gameTime++;
            if (gameTime - lastSpawnTime > SPAWN_INTERVAL / 16) {
                spawnNote();
                lastSpawnTime = gameTime;
            }

            const hitZoneY = track.offsetHeight - 130;

            notes.forEach((note, i) => {
                note.y += SPEED;
                note.element.style.top = note.y + 'px';

                // Miss 检测
                if (note.y > hitZoneY + 80 && !note.hit) {
                    note.element.className = 'note miss';
                    combo = 0;
                    showHitEffect(note.lane, 'MISS', '#e74c3c');
                    setTimeout(() => note.element.remove(), 500);
                    notes.splice(i, 1);
                    updateUI();
                }
            });

            // 30秒游戏时间
            if (gameTime > 30 * 60) {
                gameOver();
            }
        }

        function hitNote(key) {
            const hitZoneY = track.offsetHeight - 130;
            const hitWindow = 60;

            let hit = false;
            notes.forEach((note, i) => {
                if (note.key === key && !note.hit) {
                    const diff = Math.abs(note.y - hitZoneY);
                    if (diff < hitWindow) {
                        note.hit = true;
                        hit = true;
                        combo++;
                        hitNotes++;

                        let points = 0;
                        let text = '';
                        let color = '';

                        if (diff < 20) {
                            points = 100;
                            text = 'PERFECT!';
                            color = '#feca57';
                        } else if (diff < 40) {
                            points = 50;
                            text = 'GOOD!';
                            color = '#4ecdc4';
                        } else {
                            points = 20;
                            text = 'OK';
                            color = '#26de81';
                        }

                        score += points * (1 + combo * 0.1);
                        showHitEffect(note.lane, text, color);
                        note.element.remove();
                        notes.splice(i, 1);
                    }
                }
            });

            if (!hit) {
                combo = 0;
            }
            updateUI();
        }

        function showHitEffect(lane, text, color) {
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.textContent = text;
            effect.style.color = color;
            effect.style.left = (lane * 25) + '%';
            track.appendChild(effect);
            setTimeout(() => effect.remove(), 500);
        }

        function updateUI() {
            document.getElementById('score').textContent = Math.floor(score);
            document.getElementById('combo').textContent = combo;
            const acc = totalNotes > 0 ? Math.round(hitNotes / totalNotes * 100) : 100;
            document.getElementById('accuracy').textContent = acc + '%';
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            requestAnimationFrame(gameLoop);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.includes(key)) {
                keyElements[key].classList.add('active');
                hitNote(key);
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.includes(key)) {
                keyElements[key].classList.remove('active');
            }
        });

        // 触摸控制
        track.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = track.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            const lane = Math.floor(x / (rect.width / 4));
            if (lane >= 0 && lane < 4) {
                hitNote(keys[lane]);
            }
        });

        // 手柄支持
        if (window.GamepadHelper) {
            GamepadHelper.on('onButtonDown', (btn) => {
                if (btn === 'x') hitNote('d');
                if (btn === 'a') hitNote('f');
                if (btn === 'b') hitNote('j');
                if (btn === 'y') hitNote('k');
            });
        }
    </script>
</body>
</html>
