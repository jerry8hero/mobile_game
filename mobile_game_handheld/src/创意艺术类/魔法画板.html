<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>魔法画板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            overflow: hidden;
        }
        h1 { color: #ff6b6b; font-size: 1.8rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(255,255,255,0.8); }

        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.8);
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .color-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 3px solid #fff;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .color-btn:hover, .color-btn.active { transform: scale(1.2); border-color: #333; }

        .size-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 20px;
            background: #fff;
            cursor: pointer;
            font-size: 0.8rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .size-btn.active { background: #ff6b6b; color: #fff; }

        .canvas-container {
            position: relative;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        #drawCanvas {
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .action-btn:active { transform: scale(0.95); }
        .clear-btn { background: #ff6b6b; color: #fff; }
        .save-btn { background: #48dbfb; color: #fff; }

        .brush-cursor {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.3);
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        @media (max-width: 767px) {
            h1 { font-size: 1.4rem; }
            .color-btn { width: 30px; height: 30px; }
            #drawCanvas { width: 100%; max-width: 350px; height: 400px; }
        }
    </style>
</head>
<body>
    <h1>🎨 魔法画板</h1>

    <div class="toolbar">
        <div class="color-btn active" style="background: #ff6b6b;" data-color="#ff6b6b"></div>
        <div class="color-btn" style="background: #feca57;" data-color="#feca57"></div>
        <div class="color-btn" style="background: #48dbfb;" data-color="#48dbfb"></div>
        <div class="color-btn" style="background: #1dd1a1;" data-color="#1dd1a1"></div>
        <div class="color-btn" style="background: #ff9ff3;" data-color="#ff9ff3"></div>
        <div class="color-btn" style="background: #5f27cd;" data-color="#5f27cd"></div>
        <div class="color-btn" style="background: #222;" data-color="#222"></div>
        <div class="color-btn" style="background: #fff; border: 2px solid #ccc;" data-color="#fff"></div>
    </div>

    <div class="toolbar">
        <button class="size-btn active" data-size="5">小</button>
        <button class="size-btn" data-size="10">中</button>
        <button class="size-btn" data-size="20">大</button>
        <button class="size-btn" data-size="35">特大</button>
    </div>

    <div class="canvas-container">
        <canvas id="drawCanvas" width="350" height="400"></canvas>
    </div>

    <div class="action-buttons">
        <button class="action-btn clear-btn" onclick="clearCanvas()">🗑️ 清空</button>
        <button class="action-btn save-btn" onclick="saveCanvas()">💾 保存</button>
    </div>

    <script>
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let currentColor = '#ff6b6b';
        let currentSize = 5;

        // 初始化画布
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 颜色选择
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentColor = btn.dataset.color;
            });
        });

        // 画笔大小
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSize = parseInt(btn.dataset.size);
            });
        });

        function draw(x, y) {
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = currentSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
            lastX = x;
            lastY = y;
        }

        // 鼠标事件
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            draw(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseleave', () => isDrawing = false);

        // 触摸事件
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            lastX = touch.clientX - rect.left;
            lastY = touch.clientY - rect.top;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            draw(touch.clientX - rect.left, touch.clientY - rect.top);
        }, { passive: false });

        canvas.addEventListener('touchend', () => isDrawing = false);

        // 清空画布
        function clearCanvas() {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 保存画作
        function saveCanvas() {
            const link = document.createElement('a');
            link.download = 'my-drawing.png';
            link.href = canvas.toDataURL();
            link.click();
            alert('画作已保存！');
        }
    </script>
<script src="../gamepad-helper.js"></script>
<script src="../switch-controls.js"></script>
</body>
</html>
