<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小小厨神</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }
        h1 { color: #e17055; font-size: 1.8rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(255,255,255,0.8); }

        .game-area {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .kitchen {
            position: relative;
            width: 300px;
            height: 350px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .stove {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(180deg, #636e72, #2d3436);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .burner {
            width: 80px;
            height: 80px;
            background: #1e272e;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            border: 4px solid #4a4a4a;
            transition: all 0.3s;
        }
        .burner.active {
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(255,107,107,0.6);
        }
        .burner.active::after {
            content: '🔥';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            animation: flame 0.5s infinite alternate;
        }
        @keyframes flame {
            from { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        .pot {
            position: absolute;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            transition: all 0.3s;
            z-index: 5;
        }
        .pot.on-stove {
            bottom: 140px;
        }

        .ingredients-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(255,255,255,0.9);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            max-height: 350px;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 1rem;
            color: #333;
            font-weight: bold;
            text-align: center;
        }

        .ingredients-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .ingredient-btn {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            border: 2px solid transparent;
            background: #fff;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.2s;
            box 3px 8px rgba(0,-shadow: 00,0,0.1);
        }
        .ingredient-btn:hover {
            transform: scale(1.1);
            border-color: #e17055;
        }
        .ingredient-btn:active {
            transform: scale(0.95);
        }

        .dish-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            z-index: 3;
        }

        .recipe {
            position: absolute;
            top: 80px;
            left: 10px;
            background: rgba(255,255,255,0.9);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #333;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .ctrl-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .ctrl-btn:active { transform: scale(0.95); }
        .cook-btn { background: #00b894; color: #fff; }
        .clear-btn { background: #ff7675; color: #fff; }

        .result {
            margin-top: 15px;
            padding: 15px 25px;
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            font-size: 1.1rem;
            text-align: center;
            display: none;
        }
        .result.show { display: block; animation: popIn 0.3s ease; }
        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .score-display {
            margin-top: 15px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.8);
            border-radius: 20px;
            font-size: 1rem;
            color: #e17055;
            font-weight: bold;
        }

        @media (max-width: 767px) {
            h1 { font-size: 1.4rem; }
            .kitchen { width: 280px; height: 320px; }
            .ingredients-panel { max-height: 320px; }
            .ingredient-btn { width: 40px; height: 40px; font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <h1>🍳 小小厨神</h1>

    <div class="game-area">
        <div class="kitchen">
            <div class="dish-display" id="dishDisplay">🍽️</div>
            <div class="recipe" id="recipe">菜谱: 点击食材放入锅中</div>
            <div class="pot" id="pot">🍲</div>
            <div class="stove">
                <div class="burner" id="burner1" onclick="toggleBurner(1)"></div>
                <div class="burner" id="burner2" onclick="toggleBurner(2)"></div>
            </div>
        </div>

        <div class="ingredients-panel">
            <div class="panel-title">🥬 食材</div>
            <div class="ingredients-row">
                <button class="ingredient-btn" onclick="addIngredient('🥬')">🥬</button>
                <button class="ingredient-btn" onclick="addIngredient('🍅')">🍅</button>
                <button class="ingredient-btn" onclick="addIngredient('🧅')">🧅</button>
                <button class="ingredient-btn" onclick="addIngredient('🥕')">🥕</button>
                <button class="ingredient-btn" onclick="addIngredient('🥦')">🥦</button>
                <button class="ingredient-btn" onclick="addIngredient('🍄')">🍄</button>
            </div>

            <div class="panel-title">🍖 肉类</div>
            <div class="ingredients-row">
                <button class="ingredient-btn" onclick="addIngredient('🥩')">🥩</button>
                <button class="ingredient-btn" onclick="addIngredient('🍗')">🍗</button>
                <button class="ingredient-btn" onclick="addIngredient('🥓')">🥓</button>
                <button class="ingredient-btn" onclick="addIngredient('🍖')">🍖</button>
            </div>

            <div class="panel-title">🍜 主食</div>
            <div class="ingredients-row">
                <button class="ingredient-btn" onclick="addIngredient('🍚')">🍚</button>
                <button class="ingredient-btn" onclick="addIngredient('🍝')">🍝</button>
                <button class="ingredient-btn" onclick="addIngredient('🍜')">🍜</button>
                <button class="ingredient-btn" onclick="addIngredient('🥟')">🥟</button>
            </div>

            <div class="panel-title">🧂 调料</div>
            <div class="ingredients-row">
                <button class="ingredient-btn" onclick="addIngredient('🧂')">🧂</button>
                <button class="ingredient-btn" onclick="addIngredient('🧄')">🧄</button>
                <button class="ingredient-btn" onclick="addIngredient('🌶️')">🌶️</button>
                <button class="ingredient-btn" onclick="addIngredient('🧅')">🧅</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="ctrl-btn cook-btn" onclick="cook()">🍳 开始烹饪</button>
        <button class="ctrl-btn clear-btn" onclick="clearPot()">🗑️ 清空</button>
    </div>

    <div class="result" id="result"></div>
    <div class="score-display">⭐ 得分: <span id="score">0</span></div>

    <script>
        const pot = document.getElementById('pot');
        const dishDisplay = document.getElementById('dishDisplay');
        const recipe = document.getElementById('recipe');
        const result = document.getElementById('result');

        let ingredients = [];
        let isBurning = false;
        let score = 0;

        // 菜谱
        const recipes = {
            '🥬+🍚': { name: '蔬菜炒饭', emoji: '🍳', points: 20 },
            '🍅+🍚': { name: '番茄炒饭', emoji: '🍳', points: 20 },
            '🥩+🍚': { name: '牛肉炒饭', emoji: '🍳', points: 25 },
            '🍗+🍚': { name: '鸡肉炒饭', emoji: '🍳', points: 25 },
            '🍝+🍅': { name: '番茄意面', emoji: '🍝', points: 30 },
            '🍜+🥬': { name: '蔬菜拉面', emoji: '🍜', points: 25 },
            '🍜+🍗': { name: '鸡汤拉面', emoji: '🍜', points: 30 },
            '🥬+🧄': { name: '蒜蓉蔬菜', emoji: '🥗', points: 15 },
            '🥦+🍖': { name: '烤肉蔬菜', emoji: '🥘', points: 30 },
            '🍄+🍖': { name: '蘑菇烤肉', emoji: '🥘', points: 30 },
            '🥕+🍖': { name: '胡萝卜炖肉', emoji: '🥘', points: 25 },
            '🥬+🍅+🧄': { name: '蔬菜沙拉', emoji: '🥗', points: 20 },
            '🍖+🍚+🥬': { name: '蛋炒饭', emoji: '🍳', points: 25 },
            '🥩+🍅+🍝': { name: '肉酱意面', emoji: '🍝', points: 35 },
            '🥚+🍚': { name: '蛋炒饭', emoji: '🍳', points: 20 }
        };

        // 简化版菜谱检测
        function detectRecipe(ings) {
            const sorted = ings.sort().join('+');

            // 精确匹配
            if (recipes[sorted]) return recipes[sorted];

            // 模糊匹配
            for (const [key, value] of Object.entries(recipes)) {
                const recipeIngs = key.split('+');
                const matchCount = recipeIngs.filter(i => ings.includes(i)).length;
                if (matchCount >= recipeIngs.length - 1 && matchCount >= 2) {
                    return value;
                }
            }

            // 默认
            if (ings.includes('🍚') || ings.includes('🍝') || ings.includes('🍜')) {
                return { name: '家常炒饭', emoji: '🍳', points: 15 };
            }
            if (ings.length >= 3) {
                return { name: '乱炖', emoji: '🥘', points: 20 };
            }
            if (ings.length >= 1) {
                return { name: '简单料理', emoji: '🍽️', points: 10 };
            }
            return null;
        }

        function addIngredient(ing) {
            if (ingredients.length >= 5) {
                alert('锅已满！');
                return;
            }
            ingredients.push(ing);
            updatePot();
        }

        function updatePot() {
            if (ingredients.length === 0) {
                pot.textContent = '🍲';
                dishDisplay.textContent = '🍽️';
                recipe.textContent = '菜谱: 点击食材放入锅中';
            } else {
                pot.textContent = '🥘';
                dishDisplay.textContent = ingredients[ingredients.length - 1];
                recipe.textContent = '已放入: ' + ingredients.join(' ');
            }
        }

        function clearPot() {
            ingredients = [];
            isBurning = false;
            document.querySelectorAll('.burner').forEach(b => b.classList.remove('active'));
            pot.classList.remove('on-stove');
            updatePot();
            result.classList.remove('show');
        }

        function toggleBurner(num) {
            const burner = document.getElementById('burner' + num);
            if (isBurning) {
                burner.classList.remove('active');
                isBurning = false;
                pot.classList.remove('on-stove');
            } else {
                document.querySelectorAll('.burner').forEach(b => b.classList.remove('active'));
                burner.classList.add('active');
                isBurning = true;
                pot.classList.add('on-stove');
            }
        }

        function cook() {
            if (ingredients.length === 0) {
                alert('请先放入食材！');
                return;
            }
            if (!isBurning) {
                alert('请先点燃炉灶！');
                return;
            }

            // 烹饪动画
            let cookTime = 0;
            pot.textContent = '🔥';
            const cookInterval = setInterval(() => {
                cookTime++;
                const anims = ['🥘', '🍳', '🥘', '🔥'];
                pot.textContent = anims[cookTime % 4];

                if (cookTime >= 10) {
                    clearInterval(cookInterval);

                    // 出锅
                    const dish = detectRecipe(ingredients);
                    if (dish) {
                        pot.textContent = dish.emoji;
                        result.innerHTML = `🎉 做出: <strong>${dish.name}</strong><br>+${dish.points}分`;
                        result.classList.add('show');
                        score += dish.points;
                        document.getElementById('score').textContent = score;
                    }

                    // 重置炉灶
                    isBurning = false;
                    document.querySelectorAll('.burner').forEach(b => b.classList.remove('active'));
                    pot.classList.remove('on-stove');
                }
            }, 300);
        }
    </script>
<script src="../switch-controls.js"></script>
</body>
</html>
