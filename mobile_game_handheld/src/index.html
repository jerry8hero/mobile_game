    <meta name="mobile-web-app-capable" content="yes">

<body>
    <!-- 顶部导航栏 -->
    <nav class="handheld-nav">
        <div class="nav-left">
            <button class="nav-btn" id="backBtn" onclick="goBack()">🔙</button>
        </div>
        <div class="nav-center">
            <h1 class="logo">🎮 掌机游戏厅</h1>
        </div>
        <div class="nav-right">
            <button class="nav-btn checkin-btn" id="checkinBtn" onclick="showCheckinPanel()">📅</button>
            <button class="nav-btn task-btn" id="taskBtn" onclick="showTaskPanel()">📋</button>
            <button class="nav-btn shop-btn" id="shopBtn" onclick="showShopPanel()">🛒</button>
            <button class="nav-btn user-btn" id="userBtn" onclick="toggleUserPanel()">👤</button>
            <button class="nav-btn" onclick="toggleSearch()">🔍</button>
            <button class="nav-btn" onclick="toggleFullscreen()">⛶</button>
        </div>
    </nav>

    <!-- 搜索栏 -->
    <div class="search-bar" id="searchBar" style="display:none;">
        <input type="text" id="searchInput" placeholder="搜索游戏..." oninput="searchGames(this.value)">
        <button class="search-close" onclick="toggleSearch()">✕</button>
    </div>

    <!-- 搜索结果 -->
    <div class="search-results" id="searchResults" style="display:none;">
        <div class="search-header">
            <span>搜索结果: <span id="searchCount">0</span> 个</span>
            <button onclick="closeSearch()">返回</button>
        </div>
        <div class="games" id="searchGamesContainer"></div>
    </div>

    <!-- 主游戏区域 -->
    <main class="game-area">
        <!-- 游戏分类网格 -->
        <div class="category-grid" id="categoryGrid">
            <!-- 游戏分类将通过 JS 动态生成 -->
        </div>

        <!-- 游戏列表（点击分类后显示） -->
        <div class="game-list" id="gameList" style="display: none;">
            <div class="game-list-header">
                <button class="back-to-categories" onclick="showCategories()">← 返回分类</button>
                <h2 id="categoryTitle">游戏列表</h2>
            </div>
            <div class="games" id="gamesContainer">
                <!-- 游戏卡片将通过 JS 动态生成 -->
            </div>
        </div>
    </main>

    <!-- 底部虚拟按键区 -->
    <footer class="virtual-controls" id="virtualControls">
        <div class="vc-section vc-dpad">
            <div class="dpad">
                <button class="dpad-btn dpad-up" data-dir="up">▲</button>
                <button class="dpad-btn dpad-left" data-dir="left">◀</button>
                <button class="dpad-btn dpad-center">●</button>
                <button class="dpad-btn dpad-right" data-dir="right">▶</button>
                <button class="dpad-btn dpad-down" data-dir="down">▼</button>
            </div>
        </div>
        <div class="vc-section vc-buttons">
            <div class="action-buttons">
                <button class="action-btn btn-y" data-action="y">Y</button>
                <button class="action-btn btn-x" data-action="x">X</button>
                <button class="action-btn btn-b" data-action="b">B</button>
                <button class="action-btn btn-a" data-action="a">A</button>
            </div>
            <div class="system-buttons">
                <button class="system-btn" id="selectBtn">SEL</button>
                <button class="system-btn" id="startBtn">START</button>
            </div>
        </div>
    </footer>

    <!-- 手柄状态指示器 -->
    <div class="gamepad-status" id="gamepadStatus">
        <span class="status-dot disconnected"></span>

        // 初始化显示分类

            renderCategories();
            setupGamepad();
            setupVirtualControls();
        }

        // 搜索功能
        function toggleSearch() {
            const searchBar = document.getElementById('searchBar');
            const searchResults = document.getElementById('searchResults');
            if (searchBar.style.display === 'none') {
                searchBar.style.display = 'flex';
                document.getElementById('searchInput').focus();
            } else {
                searchBar.style.display = 'none';
                searchResults.style.display = 'none';
                document.getElementById('searchInput').value = '';
            }
        }

        function searchGames(query) {
            if (!query || query.length < 1) {
                document.getElementById('searchResults').style.display = 'none';
                return;
            }

            query = query.toLowerCase();
            const results = [];
            for (const [category, games] of Object.entries(categoryGames)) {
                games.forEach(game => {
                    if (game.name.toLowerCase().includes(query) ||
                        game.type.toLowerCase().includes(query)) {
                        results.push({...game, category});
                    }
                });
            }

            document.getElementById('searchCount').textContent = results.length;
            const container = document.getElementById('searchGamesContainer');
            container.innerHTML = results.map((game, index) => `
                <a href="${game.file}" class="game-card" data-index="${index}">
                    <span class="game-icon">${game.icon}</span>
                    <div class="game-info">
                        <div class="game-name">${game.name}</div>
                        <div class="game-type">${game.type}</div>
                        <div class="game-category">${game.category}</div>
                    </div>
                </a>
            `).join('');

            document.getElementById('searchResults').style.display = 'block';
            document.getElementById('categoryGrid').style.display = 'none';
        }

        function closeSearch() {
            document.getElementById('searchBar').style.display = 'none';
            document.getElementById('searchResults').style.display = 'none';
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryGrid').style.display = 'grid';
        }

        // 渲染分类网格
        function renderCategories() {
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = gameCategories.map((cat, index) => `
                <div class="category-card" data-index="${index}" style="border-color: ${cat.color}">
                    <div class="category-icon">${cat.icon}</div>
                    <div class="category-name">${cat.name}</div>
                    <div class="category-count">${cat.count} 个游戏</div>
                </div>
            `).join('');

            // 点击事件
            grid.querySelectorAll('.category-card').forEach(card => {
                card.addEventListener('click', () => {
                    const index = parseInt(card.dataset.index);
                    showCategory(gameCategories[index]);
                });
            });
        }

            currentCategory = category;
            selectedIndex = 0;
            document.getElementById('categoryGrid').style.display = 'none';
            document.getElementById('gameList').style.display = 'block';
            document.getElementById('categoryTitle').textContent = `${category.icon} ${category.name}`;

            const games = categoryGames[category.name] || [];
            const container = document.getElementById('gamesContainer');
            container.innerHTML = games.map((game, index) => {
                const isFav = window.Favorites ? window.Favorites.isFavorite(game.file) : false;
                return `
                <a href="${game.file}" class="game-card" data-index="${index}" data-file="${game.file}"
                   ondblclick="showGameDetail({name:'${game.name}',icon:'${game.icon}',type:'${game.type}',file:'${game.file}',category:'${category.name}'})">
                    <span class="game-icon">${game.icon}</span>
                    <div class="game-info">
                        <div class="game-name">${game.name}</div>
                        <div class="game-type">${game.type}</div>
                    </div>
                    <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(event, '${game.file}', '${game.name}', '${game.icon}', '${game.type}', '${category.name}')">
                        ${isFav ? '❤️' : '🤍'}
                    </button>
                </a>
            `}).join('');
        }

        function toggleFavorite(event, file, name, icon, type, category) {
            event.preventDefault();
            event.stopPropagation();

            if (window.Favorites) {
                const game = { name, icon, type, file, category };
                if (window.Favorites.isFavorite(file)) {
                    window.Favorites.removeFavorite(file);
                } else {
                    window.Favorites.addFavorite(game);
                }
                // 刷新显示
                showCategory(currentCategory);
            }

                if (window.Favorites.isFavorite(file)) {

            if (!document.fullscreenElement) {

                document.exitFullscreen();

        // 设置虚拟按键
        function setupVirtualControls() {
            // 十字键
            document.querySelectorAll('.dpad-btn[data-dir]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const dir = btn.dataset.dir;
                    handleDpadInput(dir);
                });
            });

            // ABXY 按钮
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const action = btn.dataset.action;
                    handleActionInput(action);
                });
            });

            // Select/Start
            document.getElementById('selectBtn').addEventListener('click', () => {
                handleSystemInput('select');
            });
            document.getElementById('startBtn').addEventListener('click', () => {
                handleSystemInput('start');
            });
        }

        // 处理十字键输入
        function handleDpadInput(dir) {
            if (!currentCategory) {
                // 在分类页面时，方向键选择分类
                if (dir === 'up') selectedIndex = Math.max(0, selectedIndex - 3);
                if (dir === 'down') selectedIndex = Math.min(gameCategories.length - 1, selectedIndex + 3);
                if (dir === 'left') selectedIndex = Math.max(0, selectedIndex - 1);
                if (dir === 'right') selectedIndex = Math.min(gameCategories.length - 1, selectedIndex + 1);

                // 高亮选中项
                document.querySelectorAll('.category-card').forEach((card, i) => {
                    card.classList.toggle('selected', i === selectedIndex);
                });
            } else {
                // 在游戏列表页面时，方向键选择游戏
                const games = categoryGames[currentCategory.name] || [];
                if (dir === 'up') selectedIndex = Math.max(0, selectedIndex - 2);
                if (dir === 'down') selectedIndex = Math.min(games.length - 1, selectedIndex + 2);
                if (dir === 'left') selectedIndex = Math.max(0, selectedIndex - 1);
                if (dir === 'right') selectedIndex = Math.min(games.length - 1, selectedIndex + 1);

                // 高亮选中项
                document.querySelectorAll('.game-card').forEach((card, i) => {
                    card.classList.toggle('selected', i === selectedIndex);
                });
            }
        }

        // 处理动作按钮输入
        function handleActionInput(action) {
            if (action === 'a') {
                // A键确认
                if (currentCategory) {
                    const games = categoryGames[currentCategory.name] || [];
                    if (games[selectedIndex]) {
                        window.location.href = games[selectedIndex].file;
                    }
                } else {
                    showCategory(gameCategories[selectedIndex]);
                }
            } else if (action === 'b') {
                // B键返回
                goBack();
            }
        }

        // 处理系统按钮
        function handleSystemInput(system) {
            if (system === 'start') {
                toggleFullscreen();
            } else if (system === 'select') {
                // Select 键显示手柄状态
                alert('🎮 掌机游戏厅 v1.0\n支持游戏手柄控制');
            }
        }

        // 设置手柄
        function setupGamepad() {
            const statusEl = document.getElementById('gamepadStatus');
            const dot = statusEl.querySelector('.status-dot');
            const text = statusEl.querySelector('.status-text');

            window.addEventListener('gamepadconnected', (e) => {
                dot.classList.remove('disconnected');
                dot.classList.add('connected');
                text.textContent = `已连接: ${e.gamepad.id.substring(0, 20)}`;
            });

            window.addEventListener('gamepaddisconnected', () => {
                dot.classList.remove('connected');
                dot.classList.add('disconnected');
                text.textContent = '未连接手柄';
            });
        }

        // 启动游戏
        document.addEventListener('DOMContentLoaded', init);

        // 注册 Service Worker (PWA 支持)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then((registration) => {
                    console.log('✅ Service Worker 注册成功:', registration.scope);
                })
                .catch((error) => {
                    console.log('❌ Service Worker 注册失败:', error);
                });
        }

        // 兑换礼包码

            const input = document.getElementById('giftcodeInput');

            if (!code) {
                result.innerHTML = '<p class="error">请输入礼包码</p>';

            const res = window.GiftCode.redeem(code);
            if (res.success) {
                result.innerHTML = `<p class="success">${res.message}</p>`;
                updateUserDisplay();
                // 刷新用户面板显示
                const userPanel = document.getElementById('userPanel');
                if (userPanel) {
                    const user = window.UserAccount.getUser();
                    userPanel.querySelector('.user-coins').textContent = `💰 ${user?.coins || 0} 金币`;
                }
            } else {
                result.innerHTML = `<p class="error">${res.message}</p>`;
            }

            if (!window.DailyCheckin) return;

            const isCheckedIn = window.DailyCheckin.isCheckedInToday();
            const continuousDays = window.DailyCheckin.getContinuousDays();
            const totalDays = window.DailyCheckin.getTotalDays();
            const history = window.DailyCheckin.getCheckinHistory();

            const panel = document.createElement('div');
            panel.className = 'modal show';
            panel.id = 'checkinPanel';
            panel.innerHTML = `
                <div class="checkin-panel">
                    <h3>📅 每日签到</h3>

                        <div class="stat-item">
                            <span class="stat-value">${continuousDays}</span>
                            <span class="stat-label">连续天数</span>
                        </div>

                            <span class="stat-label">总签到天数</span>
                        </div>
                    </div>
                    <div class="checkin-calendar">
                        <h4>最近签到记录</h4>
                        <div class="calendar-days">
                            ${getLast7Days().map(day => {
                                const hasCheckin = history.includes(day);
                                const dayName = day.split('-')[2];
                                return `<div class="calendar-day ${hasCheckin ? 'checked' : ''}">${dayName}</div>`;
                            }).join('')}
                        </div>
                    </div>
                    ${isCheckedIn ?
                        '<div class="checked-in-tip">✅ 今日已签到，明天再来吧！</div>' :

                    }

                </div>
            `;
            document.body.appendChild(panel);
        }

        function getLast7Days() {
            const days = [];
            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                days.push(date.toISOString().split('T')[0]);
            }
            return days;
        }

        function doCheckin() {
            if (!window.DailyCheckin) return;

            const result = window.DailyCheckin.checkin();
            if (result.success) {
                alert(result.message);
                // 添加经验
                if (window.UserAccount && window.UserAccount.addExp) {
                    window.UserAccount.addExp(20);
                }
                // 更新任务
                if (window.TaskSystem) {
                    window.TaskSystem.updateContinuousLoginTask();
                }
                showCheckinPanel();  // 刷新面板
                updateUserDisplay();
            } else {
                alert(result.message);
            }
        }

                                    </div>
                                    <button class="task-claim-btn ${task.completed && !task.claimed ? 'can-claim' : ''}"
                                            onclick="claimTask('${task.id}')"
                                            ${!task.completed || task.claimed ? 'disabled' : ''}>
                                        ${task.claimed ? '已领取' : (task.completed ? '领取' : '进行中')}
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <button onclick="this.closest('.modal').remove()">关闭</button>
                </div>
            `;
            document.body.appendChild(panel);
        }

        function claimTask(taskId) {
            if (!window.TaskSystem) return;

            const result = window.TaskSystem.claimReward(taskId);
            if (result.success) {
                alert(result.message);
                showTaskPanel();  // 刷新任务面板
                updateUserDisplay();
            } else {
                alert(result.message);
            }
        }

        // ========== 商城系统 UI ==========
        function showShopPanel() {
            const existing = document.getElementById('shopPanel');
            if (existing) {
                existing.remove();
                return;
            }

            if (!window.ShopSystem) return;

            const coins = window.UserAccount ? window.UserAccount.getCoins() : 0;
            const items = window.ShopSystem.getAllItems();

            const panel = document.createElement('div');
            panel.className = 'modal show';
            panel.id = 'shopPanel';
            panel.innerHTML = `
                <div class="shop-panel">
                    <div class="shop-header">
                        <h3>🛒 商城</h3>
                        <div class="shop-coins">💰 ${coins}</div>
                    </div>
                    <div class="shop-section">
                        <h4>头像包</h4>
                        <div class="shop-items">
                            ${items.filter(i => i.type === 'avatar_pack' || i.type === 'avatar').map(item => renderShopItem(item)).join('')}
                        </div>
                    </div>
                    <div class="shop-section">
                        <h4>称号</h4>
                        <div class="shop-items">
                            ${items.filter(i => i.type === 'title').map(item => renderShopItem(item)).join('')}
                        </div>
                    </div>
                    <div class="shop-section">
                        <h4>主题背景</h4>
                        <div class="shop-items">
                            ${items.filter(i => i.type === 'background').map(item => renderShopItem(item)).join('')}
                        </div>
                    </div>
                    <button onclick="this.closest('.modal').remove()">关闭</button>
                </div>
            `;
            document.body.appendChild(panel);
        }

        function renderShopItem(item) {
            const isOwned = window.ShopSystem.isOwned(item.id);
            return `
                <div class="shop-item ${isOwned ? 'owned' : ''}">
                    <div class="shop-item-info">
                        <div class="shop-item-name">${item.name}</div>
                        <div class="shop-item-desc">${item.desc}</div>
                    </div>
                    <div class="shop-item-action">
                        ${isOwned ?
                            '<span class="owned-tag">已拥有</span>' :
                            `<button onclick="buyItem('${item.id}')">${item.price}💰</button>`
                        }
                    </div>
                </div>
            `;
        }

        function buyItem(itemId) {
            if (!window.ShopSystem) return;

            const result = window.ShopSystem.purchase(itemId);
            if (result.success) {
                alert(result.message);
                // 更新头像列表
                if (result.item.type === 'avatar_pack' || result.item.type === 'avatar') {
                    window.UserAccount.updateAvatarList(result.item.items);
                }
                showShopPanel();  // 刷新商城
                updateUserDisplay();
            } else {
                alert(result.message);
            }
        }

        // ========== 扩展用户面板显示等级 ==========
        const originalToggleUserPanel = window.toggleUserPanel;
        window.toggleUserPanel = function() {
            originalToggleUserPanel();

            // 添加等级显示
            setTimeout(() => {
                const userPanel = document.getElementById('userPanel');
                if (userPanel && window.UserAccount) {
                    const levelInfo = window.UserAccount.getLevelInfo();
                    const user = window.UserAccount.getUser();

                    // 添加等级和经验条
                    const header = userPanel.querySelector('.user-panel-header');
                    const levelHtml = `
                        <div class="user-level-info">
                            <div class="level-badge">Lv.${levelInfo.level}</div>
                            <div class="exp-bar-container">
                                <div class="exp-bar" style="width: ${levelInfo.progress}%"></div>
                            </div>
                            <div class="exp-text">${levelInfo.exp}/${levelInfo.expForNext} 经验</div>
                        </div>
                        <div class="user-title">${levelInfo.title}</div>
                    `;

                    // 插入等级信息
                    const existingLevel = header.querySelector('.user-level-info');
                    if (!existingLevel) {
                        header.insertAdjacentHTML('beforeend', levelHtml);
                    }
                }
            }, 100);
        };

        // 更新用户显示
        function updateUserDisplay() {
            const userBtn = document.getElementById('userBtn');
            if (window.UserAccount) {
                const user = window.UserAccount.getUser();
                if (user) {
                    userBtn.textContent = user.avatar || '👤';
                }
            }
        }

        // 页面加载后初始化用户
        document.addEventListener('DOMContentLoaded', () => {
            initUser();
        });
    </script>
</body>
</html>
