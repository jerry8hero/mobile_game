<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扭蛋机</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fd79a8 0%, #e84393 50%, #a29bfe 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }
        h1 { color: #fff; font-size: 1.8rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        .info-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .info-item {
            background: rgba(255,255,255,0.9);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1rem;
        }

        .machine {
            position: relative;
            width: 280px;
            height: 380px;
            background: linear-gradient(180deg, #fd79a8 0%, #e84393 50%, #d63031 100%);
            border-radius: 30px 30px 15px 15px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .glass-dome {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            height: 200px;
            background: rgba(255,255,255,0.2);
            border-radius: 50% 50% 20% 20%;
            border: 3px solid rgba(255,255,255,0.3);
            overflow: hidden;
        }

        .gumballs {
            position: absolute;
            bottom: 10px;
            width: 100%;
            height: 150px;
        }

        .gumball {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2), 2px 2px 5px rgba(0,0,0,0.3);
            animation: wobble 2s ease-in-out infinite;
        }

        @keyframes wobble {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-5px) rotate(5deg); }
            75% { transform: translateY(-5px) rotate(-5deg); }
        }

        .dispenser {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: linear-gradient(180deg, #636e72, #2d3436);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dispenser-hole {
            width: 60px;
            height: 20px;
            background: #000;
            border-radius: 10px;
        }

        .handle {
            position: absolute;
            right: 20px;
            top: 150px;
            width: 40px;
            height: 100px;
            background: linear-gradient(90deg, #dfe6e9, #b2bec3);
            border-radius: 20px;
            cursor: pointer;
            transform-origin: bottom center;
            transition: transform 0.3s;
            box-shadow: -3px 0 10px rgba(0,0,0,0.2);
        }
        .handle::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 30px;
            background: linear-gradient(180deg, #dfe6e9, #b2bec3);
            border-radius: 15px 15px 0 0;
        }
        .handle:active {
            transform: rotate(-30deg);
        }

        .collection {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 320px;
            background: rgba(255,255,255,0.9);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }
        .collection-title {
            width: 100%;
            text-align: center;
            color: #333;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .collection-item {
            font-size: 2rem;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .gacha-result {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #fff, #f0f0f0);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: none;
        }
        .gacha-result.show {
            display: block;
            animation: resultPop 0.5s ease forwards;
        }
        @keyframes resultPop {
            0% { transform: translate(-50%, -50%) scale(0); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        .gacha-result h2 {
            color: #e84393;
            margin-bottom: 15px;
        }
        .gacha-result .emoji {
            font-size: 5rem;
            margin: 15px 0;
            animation: bounce 0.5s ease infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
        .gacha-result .name {
            font-size: 1.5rem;
            color: #333;
            font-weight: bold;
        }
        .gacha-result button {
            margin-top: 20px;
            padding: 12px 30px;
            background: #e84393;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .overlay.show { display: block; }

        @media (max-width: 767px) {
            h1 { font-size: 1.4rem; }
            .machine { width: 240px; height: 340px; }
            .glass-dome { height: 170px; }
            .gumball { width: 35px; height: 35px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <h1>🎁 扭蛋机</h1>

    <div class="info-bar">
        <div class="info-item">💰 金币: <span id="coins">100</span></div>
        <div class="info-item">📦 扭蛋数: <span id="gachaCount">0</span></div>
    </div>

    <div class="machine">
        <div class="glass-dome">
            <div class="gumballs" id="gumballs"></div>
        </div>
        <div class="dispenser">
            <div class="dispenser-hole"></div>
        </div>
        <div class="handle" id="handle" onclick="turnHandle()"></div>
    </div>

    <div class="collection">
        <div class="collection-title">收藏 🗃️</div>
        <div id="collection"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closeResult()"></div>
    <div class="gacha-result" id="gachaResult">
        <h2>🎉 扭到了!</h2>
        <div class="emoji" id="resultEmoji">🎁</div>
        <div class="name" id="resultName">神秘奖品</div>
        <button onclick="closeResult()">再来一次</button>
    </div>

    <script>
        const prizes = [
            { emoji: '🦄', name: '独角兽', rarity: 'rare' },
            { emoji: '🐲', name: '神龙', rarity: 'legend' },
            { emoji: '🦖', name: '恐龙', rarity: 'rare' },
            { emoji: '🐙', name: '章鱼', rarity: 'common' },
            { emoji: '🦋', name: '蝴蝶', rarity: 'common' },
            { emoji: '🐚', name: '贝壳', rarity: 'common' },
            { emoji: '🌈', name: '彩虹', rarity: 'rare' },
            { emoji: '⭐', name: '星星', rarity: 'common' },
            { emoji: '💎', name: '钻石', rarity: 'legend' },
            { emoji: '👑', name: '皇冠', rarity: 'legend' },
            { emoji: '🎀', name: '蝴蝶结', rarity: 'common' },
            { emoji: '🎈', name: '气球', rarity: 'common' },
            { emoji: '🎁', name: '礼盒', rarity: 'rare' },
            { emoji: '🧚', name: '精灵', rarity: 'legend' },
            { emoji: '🦩', name: '火烈鸟', rarity: 'rare' },
            { emoji: '🦦', name: '水獭', rarity: 'common' },
        ];

        let coins = 100;
        let gachaCount = 0;
        let collected = new Set();
        let isTurning = false;

        const gumballs = document.getElementById('gumballs');
        const handle = document.getElementById('handle');

        // 初始化扭蛋球
        function initGumballs() {
            gumballs.innerHTML = '';
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#ff9ff3', '#a29bfe'];
            for (let i = 0; i < 12; i++) {
                const ball = document.createElement('div');
                ball.className = 'gumball';
                ball.textContent = prizes[i].emoji;
                ball.style.background = colors[Math.floor(Math.random() * colors.length)];
                ball.style.left = (20 + Math.random() * 180) + 'px';
                ball.style.bottom = (Math.random() * 100) + 'px';
                ball.style.animationDelay = (Math.random() * 2) + 's';
                gumballs.appendChild(ball);
            }
        }

        function turnHandle() {
            if (isTurning || coins < 10) {
                if (coins < 10) alert('金币不足！需要10金币');
                return;
            }
            isTurning = true;
            coins -= 10;
            document.getElementById('coins').textContent = coins;

            handle.style.transform = 'rotate(-30deg)';
            setTimeout(() => handle.style.transform = 'rotate(0deg)', 500);

            // 动画
            setTimeout(() => {
                const result = getPrize();
                gachaCount++;
                document.getElementById('gachaCount').textContent = gachaCount;

                // 添加到收藏
                if (!collected.has(result.emoji)) {
                    collected.add(result.emoji);
                    const item = document.createElement('span');
                    item.className = 'collection-item';
                    item.textContent = result.emoji;
                    item.title = result.name;
                    document.getElementById('collection').appendChild(item);
                }

                // 显示结果
                document.getElementById('resultEmoji').textContent = result.emoji;
                document.getElementById('resultName').textContent = result.name;
                document.getElementById('overlay').classList.add('show');
                document.getElementById('gachaResult').classList.add('show');

                isTurning = false;
            }, 800);
        }

        function getPrize() {
            const rand = Math.random();
            let pool = prizes;

            if (rand < 0.05) {
                // 传奇
                pool = prizes.filter(p => p.rarity === 'legend');
            } else if (rand < 0.25) {
                // 稀有
                pool = prizes.filter(p => p.rarity === 'rare');
            } else {
                // 普通
                pool = prizes.filter(p => p.rarity === 'common');
            }

            return pool[Math.floor(Math.random() * pool.length)];
        }

        function closeResult() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('gachaResult').classList.remove('show');
        }

        // 初始化
        initGumballs();
    </script>
<script src="../switch-controls.js"></script>
<script src="../performance.js"></script>
<script src="../loading.js"></script>
<script src="../switch-controls.js"></script>
</body>
</html>
