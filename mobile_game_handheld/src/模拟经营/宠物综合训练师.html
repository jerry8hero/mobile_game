<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物综合训练师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 15px;
            user-select: none;
        }

        h1 {
            color: #fff;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .game-container {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            max-width: 500px;
            margin: 0 auto;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .nav-tab {
            flex: 1;
            min-width: 80px;
            padding: 10px 5px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.2s;
            background: #e0e0e0;
            color: #666;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .nav-tab:hover:not(.active) {
            background: #d0d0d0;
        }

        .panel { display: none; }
        .panel.active { display: block; }

        /* 宠物列表 */
        .pet-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .pet-card {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid transparent;
        }

        .pet-card:hover { transform: scale(1.02); }
        .pet-card.selected { border-color: #667eea; }
        .pet-card.empty { background: #f0f0f0; opacity: 0.6; }

        .pet-emoji { font-size: 2.5rem; }
        .pet-name { font-size: 0.9rem; font-weight: bold; margin: 5px 0; }
        .pet-level { font-size: 0.75rem; color: #666; }

        .pet-stats {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
            font-size: 0.7rem;
        }

        .stat-icon { opacity: 0.7; }

        /* 野外捕捉 */
        .wild-area {
            text-align: center;
            padding: 20px;
        }

        .wild-pet {
            font-size: 5rem;
            animation: bounce 1s ease-in-out infinite;
            margin: 20px 0;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .wild-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .wild-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn:hover { transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; }

        .catch-btn { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
        .run-btn { background: #666; color: #fff; }

        .catch-rate {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #666;
        }

        /* 养成操作 */
        .care-panel { text-align: center; }

        .care-pet {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            padding: 20px;
            color: #fff;
            margin-bottom: 15px;
        }

        .care-pet-emoji { font-size: 4rem; }
        .care-pet-name { font-size: 1.2rem; margin: 10px 0; }

        .care-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .care-stat {
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 8px;
        }

        .care-stat-label { font-size: 0.8rem; opacity: 0.8; }
        .care-stat-value { font-size: 1.2rem; font-weight: bold; }

        .care-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .care-btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .care-btn:hover { transform: scale(1.02); }
        .feed-btn { background: #ff6b6b; color: #fff; }
        .train-btn { background: #feca57; color: #333; }
        .clean-btn { background: #38ef7d; color: #333; }
        .heal-btn { background: #667eea; color: #fff; }

        /* 对战系统 */
        .battle-area {
            text-align: center;
        }

        .battle-field {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px 0;
        }

        .battle-pet {
            text-align: center;
        }

        .battle-pet-emoji {
            font-size: 3.5rem;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .battle-pet-name { font-weight: bold; margin: 5px 0; }
        .battle-hp { font-size: 0.8rem; color: #666; }

        .battle-hp-bar {
            width: 80px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin: 5px auto;
            overflow: hidden;
        }

        .battle-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #38ef7d, #00ff00);
            transition: width 0.3s;
        }

        .battle-hp-fill.low { background: linear-gradient(90deg, #ff6b6b, #ff0000); }
        .battle-hp-fill.mid { background: linear-gradient(90deg, #feca57, #ff9900); }

        .vs-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .battle-log {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
            height: 80px;
            overflow-y: auto;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        .battle-log-item { padding: 3px 0; }

        .battle-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .attack-btn { background: linear-gradient(135deg, #ff6b6b, #f5576c); color: #fff; }
        .defend-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .special-btn { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }

        /* 繁殖系统 */
        .breed-panel { text-align: center; }

        .breed-slots {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .breed-slot {
            width: 100px;
            height: 120px;
            border: 3px dashed #ccc;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .breed-slot.selected { border-color: #667eea; background: #f0f0ff; }
        .breed-slot .pet-emoji { font-size: 2.5rem; }
        .breed-slot .pet-name { font-size: 0.8rem; }

        .breed-result {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-radius: 15px;
            color: #fff;
            display: none;
        }

        .breed-result.show { display: block; animation: pop 0.5s; }

        @keyframes pop {
            from { transform: scale(0.8); }
            to { transform: scale(1); }
        }

        .breed-result-emoji { font-size: 4rem; }

        /* 消息提示 */
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.2rem;
            display: none;
            z-index: 100;
            text-align: center;
            max-width: 80%;
        }

        .message.show { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .no-pet {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
        }

        @media (max-width: 400px) {
            .game-container { padding: 15px; }
            .pet-list { grid-template-columns: 1fr 1fr; }
            .nav-tab { min-width: 70px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <a href="游戏主页.html" class="back-btn">← 返回</a>

    <h1>🐾 宠物综合训练师</h1>

    <div class="game-container">
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('pets')">📋 宠物</button>
            <button class="nav-tab" onclick="showTab('wild')">🌲 野外</button>
            <button class="nav-tab" onclick="showTab('care')">💝 养成</button>
            <button class="nav-tab" onclick="showTab('battle')">⚔️ 对战</button>
            <button class="nav-tab" onclick="showTab('breed')">💕 繁殖</button>
        </div>

        <!-- 宠物列表 -->
        <div class="panel active" id="pets-panel">
            <div class="pet-list" id="petList"></div>
        </div>

        <!-- 野外捕捉 -->
        <div class="panel" id="wild-panel">
            <div class="wild-area">
                <div class="wild-info">
                    <div>野生宠物出现！</div>
                    <div style="font-size: 0.85rem; color: #666; margin-top: 5px;">
                        等级: <span id="wildLevel">1</span> | 血量: <span id="wildHp">50</span>
                    </div>
                </div>
                <div class="wild-pet" id="wildPet">🐺</div>
                <div class="wild-buttons">
                    <button class="btn catch-btn" onclick="catchPet()">🎯 捕捉</button>
                    <button class="btn run-btn" onclick="encounterWild()">🏃 逃跑</button>
                </div>
                <div class="catch-rate">捕捉成功率: <span id="catchRate">30</span>%</div>
            </div>
        </div>

        <!-- 养成 -->
        <div class="panel" id="care-panel">
            <div class="care-panel" id="careContent">
                <div class="no-pet">请先在宠物面板选择一只宠物</div>
            </div>
        </div>

        <!-- 对战 -->
        <div class="panel" id="battle-panel">
            <div class="battle-area">
                <div style="margin-bottom: 10px;">
                    <strong>选择两只宠物对战</strong>
                </div>
                <div class="battle-field">
                    <div class="battle-pet" id="battlePet1">
                        <div class="battle-pet-emoji">❓</div>
                        <div class="battle-pet-name">选择宠物</div>
                        <div class="battle-hp-bar"><div class="battle-hp-fill" style="width: 100%"></div></div>
                    </div>
                    <div class="vs-text">VS</div>
                    <div class="battle-pet" id="battlePet2">
                        <div class="battle-pet-emoji">❓</div>
                        <div class="battle-pet-name">选择宠物</div>
                        <div class="battle-hp-bar"><div class="battle-hp-fill" style="width: 100%"></div></div>
                    </div>
                </div>
                <div class="battle-log" id="battleLog">
                    <div class="battle-log-item">选择两只宠物开始对战！</div>
                </div>
                <div class="battle-buttons">
                    <button class="btn attack-btn" onclick="battleAction('attack')">⚔️ 攻击</button>
                    <button class="btn defend-btn" onclick="battleAction('defend')">🛡️ 防御</button>
                    <button class="btn special-btn" onclick="battleAction('special')">✨ 必杀</button>
                </div>
            </div>
        </div>

        <!-- 繁殖 -->
        <div class="panel" id="breed-panel">
            <div class="breed-panel">
                <div style="margin-bottom: 10px;">选择两只宠物进行繁殖</div>
                <div class="breed-slots">
                    <div class="breed-slot" id="breedSlot1" onclick="selectBreedPet(1)">
                        <span style="font-size: 2rem;">➕</span>
                        <span style="font-size: 0.8rem; color: #999;">选择宠物</span>
                    </div>
                    <div class="breed-slot" id="breedSlot2" onclick="selectBreedPet(2)">
                        <span style="font-size: 2rem;">➕</span>
                        <span style="font-size: 0.8rem; color: #999;">选择宠物</span>
                    </div>
                </div>
                <button class="btn catch-btn" onclick="breedPets()">💕 开始繁殖</button>
                <div class="breed-result" id="breedResult">
                    <div class="breed-result-emoji" id="breedResultEmoji">🐣</div>
                    <div id="breedResultName">新宠物</div>
                    <div style="margin-top: 10px; font-size: 0.9rem;">恭喜获得新宠物!</div>
                </div>
            </div>
        </div>
    </div>

    <div class="message" id="message"></div>

    <script>
        // 宠物数据
        const petTypes = [
            { emoji: '🐺', name: '小狼', type: 'normal', hp: 100, attack: 15, defense: 10, speed: 12 },
            { emoji: '🐱', name: '小猫', type: 'normal', hp: 80, attack: 12, defense: 8, speed: 15 },
            { emoji: '🦊', name: '小狐', type: 'fire', hp: 85, attack: 18, defense: 7, speed: 14 },
            { emoji: '🐉', name: '小龙', type: 'dragon', hp: 120, attack: 20, defense: 15, speed: 10 },
            { emoji: '🦁', name: '小狮', type: 'normal', hp: 110, attack: 22, defense: 12, speed: 11 },
            { emoji: '🐼', name: '小熊', type: 'normal', hp: 130, attack: 16, defense: 18, speed: 8 },
            { emoji: '🦋', name: '蝴蝶', type: 'air', hp: 70, attack: 14, defense: 6, speed: 20 },
            { emoji: '🐢', name: '小龟', type: 'water', hp: 140, attack: 10, defense: 20, speed: 6 },
            { emoji: '🦅', name: '小鹰', type: 'air', hp: 90, attack: 19, defense: 9, speed: 16 },
            { emoji: '🐍', name: '小蛇', type: 'poison', hp: 75, attack: 17, defense: 7, speed: 18 },
            { emoji: '🦄', name: '独角', type: 'magic', hp: 100, attack: 20, defense: 12, speed: 14 },
            { emoji: '🐙', name: '章鱼', type: 'water', hp: 110, attack: 14, defense: 14, speed: 12 }
        ];

        // 玩家宠物
        let myPets = [];
        let selectedPet = null;
        let selectedBreed1 = null;
        let selectedBreed2 = null;

        // 野生宠物
        let wildPet = null;

        // 对战状态
        let battleState = {
            pet1: null,
            pet2: null,
            hp1: 0,
            hp2: 0,
            turn: 0,
            defending: [false, false]
        };

        // 初始化
        function init() {
            // 送一只初始宠物
            addPet(0, '小狼', 1);
            renderPetList();
            encounterWild();
        }

        // 添加宠物
        function addPet(typeIndex, name, level) {
            const petType = petTypes[typeIndex];
            const pet = {
                id: Date.now() + Math.random(),
                typeIndex: typeIndex,
                name: name || petType.name,
                level: level || 1,
                exp: 0,
                hp: petType.hp,
                maxHp: petType.hp,
                attack: petType.attack,
                defense: petType.defense,
                speed: petType.speed
            };
            myPets.push(pet);
            return pet;
        }

        // 渲染宠物列表
        function renderPetList() {
            const list = document.getElementById('petList');
            list.innerHTML = '';

            myPets.forEach((pet, index) => {
                const type = petTypes[pet.typeIndex];
                const card = document.createElement('div');
                card.className = 'pet-card' + (selectedPet && selectedPet.id === pet.id ? ' selected' : '');
                card.onclick = () => selectPet(index);
                card.innerHTML = `
                    <div class="pet-emoji">${type.emoji}</div>
                    <div class="pet-name">${pet.name}</div>
                    <div class="pet-level">Lv.${pet.level}</div>
                    <div class="pet-stats">
                        <span class="stat-icon">❤️${pet.hp}</span>
                        <span class="stat-icon">⚔️${pet.attack}</span>
                    </div>
                `;
                list.appendChild(card);
            });

            // 空位
            for (let i = myPets.length; i < 6; i++) {
                const empty = document.createElement('div');
                empty.className = 'pet-card empty';
                empty.innerHTML = `
                    <div class="pet-emoji" style="opacity:0.3">➕</div>
                    <div class="pet-name" style="opacity:0.5">空位</div>
                `;
                list.appendChild(empty);
            }
        }

        // 选择宠物
        function selectPet(index) {
            if (index >= myPets.length) return;
            selectedPet = myPets[index];
            renderPetList();
            renderCarePanel();
            showTab('care');
        }

        // 显示标签页
        function showTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

            const tabIndex = ['pets', 'wild', 'care', 'battle', 'breed'].indexOf(tabName);
            document.querySelectorAll('.nav-tab')[tabIndex].classList.add('active');
            document.getElementById(tabName + '-panel').classList.add('active');
        }

        // 遇到野生宠物
        function encounterWild() {
            const typeIndex = Math.floor(Math.random() * petTypes.length);
            const type = petTypes[typeIndex];
            const level = Math.floor(Math.random() * 5) + 1;

            wildPet = {
                typeIndex: typeIndex,
                level: level,
                hp: type.hp + level * 10,
                maxHp: type.hp + level * 10,
                attack: type.attack + level * 2,
                defense: type.defense + level,
                speed: type.speed + level
            };

            document.getElementById('wildPet').textContent = type.emoji;
            document.getElementById('wildLevel').textContent = level;
            document.getElementById('wildHp').textContent = wildPet.hp;

            // 计算捕捉率
            const rate = Math.max(10, 50 - wildPet.level * 5);
            document.getElementById('catchRate').textContent = rate;
        }

        // 捕捉宠物
        function catchPet() {
            if (myPets.length >= 6) {
                showMessage('宠物已满！无法捕捉更多');
                return;
            }

            const rate = parseInt(document.getElementById('catchRate').textContent);
            const roll = Math.random() * 100;

            if (roll < rate) {
                const type = petTypes[wildPet.typeIndex];
                addPet(wildPet.typeIndex, type.name, wildPet.level);
                renderPetList();
                showMessage(`🎉 捕捉成功！获得 ${type.emoji}${type.name}`);
                encounterWild();
            } else {
                showMessage('😢 捕捉失败！宠物逃走了');
                encounterWild();
            }
        }

        // 渲染养成面板
        function renderCarePanel() {
            const content = document.getElementById('careContent');

            if (!selectedPet) {
                content.innerHTML = '<div class="no-pet">请先在宠物面板选择一只宠物</div>';
                return;
            }

            const type = petTypes[selectedPet.typeIndex];
            const hpPercent = (selectedPet.hp / selectedPet.maxHp) * 100;
            const expPercent = (selectedPet.exp / (selectedPet.level * 100)) * 100;

            content.innerHTML = `
                <div class="care-pet">
                    <div class="care-pet-emoji">${type.emoji}</div>
                    <div class="care-pet-name">${selectedPet.name} Lv.${selectedPet.level}</div>
                </div>
                <div class="care-stats">
                    <div class="care-stat">
                        <div class="care-stat-label">❤️ 生命</div>
                        <div class="care-stat-value">${selectedPet.hp}/${selectedPet.maxHp}</div>
                        <div style="width:100%;height:6px;background:rgba(255,255,255,0.3);border-radius:3px;margin-top:5px;">
                            <div style="width:${hpPercent}%;height:100%;background:#fff;border-radius:3px;"></div>
                        </div>
                    </div>
                    <div class="care-stat">
                        <div class="care-stat-label">⭐ 经验</div>
                        <div class="care-stat-value">${selectedPet.exp}/${selectedPet.level * 100}</div>
                        <div style="width:100%;height:6px;background:rgba(255,255,255,0.3);border-radius:3px;margin-top:5px;">
                            <div style="width:${expPercent}%;height:100%;background:#fff;border-radius:3px;"></div>
                        </div>
                    </div>
                    <div class="care-stat">
                        <div class="care-stat-label">⚔️ 攻击</div>
                        <div class="care-stat-value">${selectedPet.attack}</div>
                    </div>
                    <div class="care-stat">
                        <div class="care-stat-label">🛡️ 防御</div>
                        <div class="care-stat-value">${selectedPet.defense}</div>
                    </div>
                </div>
                <div class="care-buttons">
                    <button class="care-btn feed-btn" onclick="feedPet()">🍖 喂食</button>
                    <button class="care-btn train-btn" onclick="trainPet()">🏋️ 训练</button>
                    <button class="care-btn clean-btn" onclick="cleanPet()">🛁 洗澡</button>
                    <button class="care-btn heal-btn" onclick="healPet()">💊 治疗</button>
                </div>
            `;
        }

        // 喂食
        function feedPet() {
            if (!selectedPet) return;
            selectedPet.hp = Math.min(selectedPet.maxHp, selectedPet.hp + 30);
            selectedPet.exp += 10;
            checkLevelUp();
            renderCarePanel();
            showMessage('🍖 喂食成功！');
        }

        // 训练
        function trainPet() {
            if (!selectedPet) return;
            selectedPet.attack += 1;
            selectedPet.defense += 1;
            selectedPet.exp += 20;
            checkLevelUp();
            renderCarePanel();
            showMessage('🏋️ 训练成功！攻击+1 防御+1');
        }

        // 洗澡
        function cleanPet() {
            if (!selectedPet) return;
            selectedPet.hp = Math.min(selectedPet.maxHp, selectedPet.hp + 10);
            selectedPet.exp += 5;
            checkLevelUp();
            renderCarePanel();
            showMessage('🛁 洗澡成功！');
        }

        // 治疗
        function healPet() {
            if (!selectedPet) return;
            selectedPet.hp = selectedPet.maxHp;
            selectedPet.exp += 15;
            checkLevelUp();
            renderCarePanel();
            showMessage('💊 治疗成功！');
        }

        // 检查升级
        function checkLevelUp() {
            if (!selectedPet) return;
            const expNeeded = selectedPet.level * 100;
            if (selectedPet.exp >= expNeeded) {
                selectedPet.level++;
                selectedPet.exp = 0;
                selectedPet.maxHp += 10;
                selectedPet.hp = selectedPet.maxHp;
                selectedPet.attack += 2;
                selectedPet.defense += 2;
                showMessage(`🎉 升级了！现在是 ${selectedPet.level} 级！`);
            }
        }

        // 选择对战宠物
        function selectBattlePet(slot) {
            if (myPets.length < 2) {
                showMessage('至少需要2只宠物才能对战');
                return;
            }

            // 简单实现：自动选择前两只宠物
            if (slot === 1 && myPets.length > 0) {
                battleState.pet1 = myPets[0];
                battleState.hp1 = myPets[0].hp;
                const type = petTypes[myPets[0].typeIndex];
                document.getElementById('battlePet1').innerHTML = `
                    <div class="battle-pet-emoji">${type.emoji}</div>
                    <div class="battle-pet-name">${myPets[0].name}</div>
                    <div class="battle-hp-bar"><div class="battle-hp-fill" style="width: 100%"></div></div>
                `;
            } else if (slot === 2 && myPets.length > 1) {
                battleState.pet2 = myPets[1];
                battleState.hp2 = myPets[1].hp;
                const type = petTypes[myPets[1].typeIndex];
                document.getElementById('battlePet2').innerHTML = `
                    <div class="battle-pet-emoji">${type.emoji}</div>
                    <div class="battle-pet-name">${myPets[1].name}</div>
                    <div class="battle-hp-bar"><div class="battle-hp-fill" style="width: 100%"></div></div>
                `;
            }

            updateBattleUI();
        }

        // 初始化对战
        function initBattle() {
            if (myPets.length < 2) {
                showMessage('至少需要2只宠物才能对战');
                return;
            }

            battleState.pet1 = myPets[0];
            battleState.pet2 = myPets[1];
            battleState.hp1 = myPets[0].hp;
            battleState.hp2 = myPets[1].hp;
            battleState.turn = 0;
            battleState.defending = [false, false];

            const type1 = petTypes[myPets[0].typeIndex];
            const type2 = petTypes[myPets[1].typeIndex];

            document.getElementById('battlePet1').innerHTML = `
                <div class="battle-pet-emoji">${type1.emoji}</div>
                <div class="battle-pet-name">${myPets[0].name}</div>
                <div class="battle-hp-bar"><div class="battle-hp-fill" style="width: 100%"></div></div>
            `;

            document.getElementById('battlePet2').innerHTML = `
                <div class="battle-pet-emoji">${type2.emoji}</div>
                <div class="battle-pet-name">${myPets[1].name}</div>
                <div class="battle-hp-bar"><div class="battle-hp-fill" style="width: 100%"></div></div>
            `;

            document.getElementById('battleLog').innerHTML = '<div class="battle-log-item">⚔️ 对战开始！</div>';
            updateBattleUI();
        }

        // 对战操作
        function battleAction(action) {
            if (!battleState.pet1 || !battleState.pet2) {
                initBattle();
                return;
            }

            const attacker = battleState.turn === 0 ? battleState.pet1 : battleState.pet2;
            const defender = battleState.turn === 0 ? battleState.pet2 : battleState.pet1;
            const attackerIdx = battleState.turn;
            const defenderIdx = 1 - battleState.turn;

            let damage = 0;
            let logMsg = '';

            // 重置防御状态
            battleState.defending[defenderIdx] = false;

            if (action === 'attack') {
                damage = Math.max(1, attacker.attack - defender.defense * 0.5);
                damage = Math.floor(damage * (0.8 + Math.random() * 0.4));
                logMsg = `⚔️ ${attacker.name} 攻击造成 ${damage} 伤害！`;
            } else if (action === 'defend') {
                battleState.defending[attackerIdx] = true;
                damage = 0;
                logMsg = `🛡️ ${attacker.name} 进入防御状态！`;
            } else if (action === 'special') {
                damage = Math.floor(attacker.attack * 1.5);
                damage = Math.max(1, damage - defender.defense * 0.3);
                damage = Math.floor(damage * (0.8 + Math.random() * 0.4));
                logMsg = `✨ ${attacker.name} 使用必杀技造成 ${damage} 伤害！`;
            }

            // 造成伤害
            if (battleState.turn === 0) {
                battleState.hp2 = Math.max(0, battleState.hp2 - damage);
            } else {
                battleState.hp1 = Math.max(0, battleState.hp1 - damage);
            }

            // 记录日志
            const log = document.getElementById('battleLog');
            log.innerHTML += `<div class="battle-log-item">${logMsg}</div>`;
            log.scrollTop = log.scrollHeight;

            // 检查胜负
            if (battleState.hp1 <= 0 || battleState.hp2 <= 0) {
                const winner = battleState.hp1 > 0 ? battleState.pet1 : battleState.pet2;
                log.innerHTML += `<div class="battle-log-item">🏆 ${winner.name} 获胜！</div>`;
                log.scrollTop = log.scrollHeight;

                // 奖励
                if (winner === battleState.pet1) {
                    battleState.pet1.exp += 50;
                    checkLevelUpForPet(battleState.pet1);
                } else {
                    battleState.pet2.exp += 50;
                    checkLevelUpForPet(battleState.pet2);
                }

                setTimeout(() => {
                    battleState.pet1 = null;
                    battleState.pet2 = null;
                }, 2000);
                return;
            }

            battleState.turn = 1 - battleState.turn;
            updateBattleUI();
        }

        // 检查宠物升级
        function checkLevelUpForPet(pet) {
            const expNeeded = pet.level * 100;
            if (pet.exp >= expNeeded) {
                pet.level++;
                pet.exp = 0;
                pet.maxHp += 10;
                pet.hp = pet.maxHp;
                pet.attack += 2;
                pet.defense += 2;
            }
        }

        // 更新对战UI
        function updateBattleUI() {
            if (!battleState.pet1 || !battleState.pet2) {
                // 自动开始
                if (myPets.length >= 2) {
                    initBattle();
                }
                return;
            }

            const hp1Percent = (battleState.hp1 / battleState.pet1.maxHp) * 100;
            const hp2Percent = (battleState.hp2 / battleState.pet2.maxHp) * 100;

            const hp1Fill = document.querySelector('#battlePet1 .battle-hp-fill');
            const hp2Fill = document.querySelector('#battlePet2 .battle-hp-fill');

            hp1Fill.style.width = hp1Percent + '%';
            hp1Fill.className = 'battle-hp-fill ' + (hp1Percent < 30 ? 'low' : hp1Percent < 60 ? 'mid' : '');

            hp2Fill.style.width = hp2Percent + '%';
            hp2Fill.className = 'battle-hp-fill ' + (hp2Percent < 30 ? 'low' : hp2Percent < 60 ? 'mid' : '');
        }

        // 选择繁殖宠物
        function selectBreedPet(slot) {
            if (myPets.length < 2) {
                showMessage('至少需要2只宠物才能繁殖');
                return;
            }

            // 简单实现：选择前两只
            if (slot === 1) {
                selectedBreed1 = myPets[0];
                const type = petTypes[myPets[0].typeIndex];
                document.getElementById('breedSlot1').innerHTML = `
                    <div class="pet-emoji">${type.emoji}</div>
                    <div class="pet-name">${myPets[0].name}</div>
                `;
                document.getElementById('breedSlot1').classList.add('selected');
            } else {
                selectedBreed2 = myPets[1];
                const type = petTypes[myPets[1].typeIndex];
                document.getElementById('breedSlot2').innerHTML = `
                    <div class="pet-emoji">${type.emoji}</div>
                    <div class="pet-name">${myPets[1].name}</div>
                `;
                document.getElementById('breedSlot2').classList.add('selected');
            }
        }

        // 繁殖宠物
        function breedPets() {
            if (!selectedBreed1 || !selectedBreed2) {
                showMessage('请选择两只宠物进行繁殖');
                return;
            }

            if (myPets.length >= 6) {
                showMessage('宠物已满！无法繁殖新宠物');
                return;
            }

            // 随机继承属性
            const newTypeIndex = Math.random() > 0.5 ? selectedBreed1.typeIndex : selectedBreed2.typeIndex;
            const type = petTypes[newTypeIndex];
            const newLevel = Math.max(selectedBreed1.level, selectedBreed2.level);

            addPet(newTypeIndex, type.name + ' Jr.', newLevel);
            renderPetList();

            // 显示结果
            document.getElementById('breedResultEmoji').textContent = type.emoji;
            document.getElementById('breedResultName').textContent = type.name + ' Jr.';
            document.getElementById('breedResult').classList.add('show');

            showMessage('💕 繁殖成功！');

            // 重置选择
            selectedBreed1 = null;
            selectedBreed2 = null;
            setTimeout(() => {
                document.getElementById('breedResult').classList.remove('show');
                document.getElementById('breedSlot1').innerHTML = `
                    <span style="font-size: 2rem;">➕</span>
                    <span style="font-size: 0.8rem; color: #999;">选择宠物</span>
                `;
                document.getElementById('breedSlot2').innerHTML = `
                    <span style="font-size: 2rem;">➕</span>
                    <span style="font-size: 0.8rem; color: #999;">选择宠物</span>
                `;
                document.getElementById('breedSlot1').classList.remove('selected');
                document.getElementById('breedSlot2').classList.remove('selected');
            }, 2000);
        }

        // 显示消息
        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 2000);
        }

        // 初始化
        init();
    </script>

<script src="../performance.js"></script>
<script src="../loading.js"></script>
<script src="../switch-controls.js"></script>
