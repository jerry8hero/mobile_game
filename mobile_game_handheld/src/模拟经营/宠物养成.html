<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物养成</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 15px;
            user-select: none;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .game-container {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .pet-display {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            position: relative;
        }

        .pet-emoji {
            font-size: 5rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .pet-emoji.eating { animation: none; }
        .pet-emoji.sleeping { animation: none; }

        .pet-name {
            color: #fff;
            font-size: 1.5rem;
            margin-top: 10px;
        }

        .mood {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .mood-item {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            color: #fff;
            font-size: 0.9rem;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .stat-bar {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 10px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            height: 15px;
            background: #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.3s;
        }

        .stat-fill.hunger { background: linear-gradient(90deg, #ff6b6b, #feca57); }
        .stat-fill.happiness { background: linear-gradient(90deg, #a8edea, #38ef7d); }
        .stat-fill.energy { background: linear-gradient(90deg, #667eea, #764ba2); }
        .stat-fill.health { background: linear-gradient(90deg, #f093fb, #f5576c); }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .action-btn {
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .action-btn:hover { transform: scale(1.02); }
        .action-btn:disabled { opacity: 0.5; }

        .feed-btn { background: #ff6b6b; color: #fff; }
        .play-btn { background: #feca57; color: #333; }
        .sleep-btn { background: #667eea; color: #fff; }
        .clean-btn { background: #38ef7d; color: #333; }

        .events {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px;
            max-height: 100px;
            overflow-y: auto;
        }

        .event {
            font-size: 0.85rem;
            color: #666;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        .event:last-child { border: none; }

        .level-up {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: #fff;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }

        .level-up.show { display: block; animation: pop 0.5s; }

        @keyframes pop {
            from { transform: scale(0.8); }
            to { transform: scale(1); }
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 1.2rem;
            display: none;
            z-index: 100;
        }

        .message.show { display: block; }
    </style>
</head>
<body>
    <h1>🐾 宠物养成</h1>

    <div class="game-container">
        <div class="pet-display">
            <div class="pet-emoji" id="petEmoji">🐱</div>
            <div class="pet-name" id="petName">小咪</div>
            <div class="mood">
                <div class="mood-item">❤️ 等级 <span id="level">1</span></div>
                <div class="mood-item">⭐ 经验 <span id="exp">0</span>/100</div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-bar">
                <div class="stat-label">🍖 饥饿度</div>
                <div class="stat-value">
                    <div class="stat-fill hunger" id="hungerBar" style="width: 80%"></div>
                </div>
            </div>
            <div class="stat-bar">
                <div class="stat-label">😊 快乐度</div>
                <div class="stat-value">
                    <div class="stat-fill happiness" id="happinessBar" style="width: 80%"></div>
                </div>
            </div>
            <div class="stat-bar">
                <div class="stat-label">⚡ 精力</div>
                <div class="stat-value">
                    <div class="stat-fill energy" id="energyBar" style="width: 80%"></div>
                </div>
            </div>
            <div class="stat-bar">
                <div class="stat-label">💚 健康度</div>
                <div class="stat-value">
                    <div class="stat-fill health" id="healthBar" style="width: 100%"></div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="action-btn feed-btn" onclick="feed()">🍖 喂食</button>
            <button class="action-btn play-btn" onclick="play()">🎾 玩耍</button>
            <button class="action-btn sleep-btn" onclick="sleep()">😴 睡觉</button>
            <button class="action-btn clean-btn" onclick="clean()">🛁 洗澡</button>
        </div>

        <div class="level-up" id="levelUp">
            🎉 升级了！现在是2级！
        </div>

        <div class="events" id="events">
            <div class="event">欢迎来到宠物养成游戏！</div>
        </div>
    </div>

    <div class="message" id="message"></div>

    <script>
        const pets = ['🐱', '🐶', '🐰', '🐼', '🦁', '🐨', '🐯'];
        const petNames = ['小咪', '旺财', '小白', '团子', '小狮子', '小考拉', '小老虎'];
        const actions = ['吃了美味的食物', '开心地玩耍', '美美地睡了一觉', '洗了热水澡'];

        let petIndex = 0;
        let level = 1;
        let exp = 0;
        let hunger = 80;    // 越高越好
        let happiness = 80; // 越高越好
        let energy = 80;    // 越高越好
        let health = 100;   // 越高越好
        let isSleeping = false;
        let isBusy = false;

        function addEvent(text) {
            const events = document.getElementById('events');
            const event = document.createElement('div');
            event.className = 'event';
            event.textContent = '• ' + text;
            events.insertBefore(event, events.firstChild);

            // 只保留最近10条
            while (events.children.length > 10) {
                events.removeChild(events.lastChild);
            }
        }

        function updateUI() {
            document.getElementById('petEmoji').textContent = pets[petIndex];
            document.getElementById('petName').textContent = petNames[petIndex];
            document.getElementById('level').textContent = level;
            document.getElementById('exp').textContent = exp;

            document.getElementById('hungerBar').style.width = hunger + '%';
            document.getElementById('happinessBar').style.width = happiness + '%';
            document.getElementById('energyBar').style.width = energy + '%';
            document.getElementById('healthBar').style.width = health + '%';

            // 检查宠物状态
            checkStatus();
        }

        function checkStatus() {
            const emoji = document.getElementById('petEmoji');

            if (isSleeping) {
                emoji.textContent = '😴';
                emoji.className = 'pet-emoji sleeping';
                return;
            }

            emoji.className = 'pet-emoji';

            if (hunger < 30 || happiness < 30 || health < 50) {
                emoji.textContent = '😢';
                addEvent('宠物不太舒服...');
            } else if (hunger > 70 && happiness > 70 && energy > 70) {
                emoji.textContent = pets[petIndex];
                addEvent('宠物很开心！');
            }
        }

        function addExp(amount) {
            exp += amount;
            if (exp >= 100) {
                level++;
                exp = 0;
                showMessage('🎉 升级了！');
                document.getElementById('levelUp').classList.add('show');
                document.getElementById('levelUp').textContent = '🎉 升级了！现在是' + level + '级！';

                // 解锁新宠物
                if (level <= pets.length) {
                    petIndex = level - 1;
                }

                setTimeout(() => {
                    document.getElementById('levelUp').classList.remove('show');
                }, 3000);
            }
        }

        function feed() {
            if (isBusy || isSleeping) return;

            hunger = Math.min(100, hunger + 30);
            energy = Math.min(100, energy + 5);
            health = Math.min(100, health + 5);
            addExp(10);
            addEvent(actions[0]);
            showMessage('🍖 喂食成功！');

            updateUI();
        }

        function play() {
            if (isBusy || isSleeping) return;

            if (energy < 20) {
                showMessage('太累了，先睡觉吧！');
                return;
            }

            happiness = Math.min(100, happiness + 25);
            energy = Math.max(0, energy - 15);
            hunger = Math.max(0, hunger - 10);
            addExp(15);
            addEvent(actions[1]);

            updateUI();
        }

        function sleep() {
            if (isBusy) return;

            isSleeping = true;
            isBusy = true;
            showMessage('😴 睡觉中...');

            // 模拟睡觉
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                energy = Math.min(100, energy + 10);

                if (progress >= 100) {
                    clearInterval(interval);
                    isSleeping = false;
                    isBusy = false;
                    happiness = Math.min(100, happiness + 10);
                    addExp(5);
                    addEvent(actions[2]);
                    showMessage('💤 睡醒了！');
                    updateUI();
                }
            }, 300);

            updateUI();
        }

        function clean() {
            if (isBusy || isSleeping) return;

            health = Math.min(100, health + 20);
            happiness = Math.min(100, happiness + 10);
            addExp(8);
            addEvent(actions[3]);
            showMessage('🛁 洗澡成功！');

            updateUI();
        }

        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 1500);
        }

        // 自动降低属性
        setInterval(() => {
            if (!isSleeping) {
                hunger = Math.max(0, hunger - 2);
                happiness = Math.max(0, happiness - 2);
                energy = Math.max(0, energy - 1);
                health = Math.max(0, health - 1);
                updateUI();
            }
        }, 5000);

        updateUI();
    </script>
<script src="../switch-controls.js"></script>
</body>
</html>
