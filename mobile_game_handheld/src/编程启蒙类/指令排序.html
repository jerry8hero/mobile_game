<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指令排序</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 15px;
            user-select: none;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .info-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info-item {
            background: rgba(255,255,255,0.25);
            padding: 8px 18px;
            border-radius: 20px;
            color: #fff;
            font-size: 1.1rem;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            max-width: 400px;
        }

        .level-display {
            background: #fff;
            padding: 15px 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .level-display h2 {
            color: #333;
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .level-display p {
            color: #666;
            font-size: 0.95rem;
        }

        .task-container {
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 15px;
            width: 100%;
        }

        .task-title {
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .command-slots {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 50px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .slot {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.3);
            border: 2px dashed rgba(255,255,255,0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .slot.filled {
            background: #fff;
            border-style: solid;
            border-color: #27ae60;
        }

        .command-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .command-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 10px;
            font-size: 1.8rem;
            cursor: pointer;
            background: #fff;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            transition: all 0.15s;
        }

        .command-btn:hover {
            transform: scale(1.1);
        }

        .command-btn:active {
            transform: scale(0.95);
        }

        .command-btn.used {
            opacity: 0.3;
            pointer-events: none;
        }

        .result-area {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            width: 100%;
            display: none;
        }

        .result-area.show {
            display: block;
        }

        .result-area h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .result-area.success h3 {
            color: #27ae60;
        }

        .result-area.fail h3 {
            color: #e74c3c;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button.action-btn {
            padding: 12px 28px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 3px 15px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        button.action-btn:hover {
            transform: translateY(-2px);
        }

        .btn-check { background: #27ae60; color: #fff; }
        .btn-reset { background: #f39c12; color: #fff; }
        .btn-next { background: #3498db; color: #fff; }

        .instructions {
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
        }

        @media (max-width: 350px) {
            .slot, .command-btn { width: 40px; height: 40px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <h1>📝 指令排序</h1>

    <div class="info-bar">
        <div class="info-item">关卡: <span id="level">1</span></div>
        <div class="info-item">得分: <span id="score">0</span></div>
    </div>

    <div class="game-area">
        <div class="level-display">
            <h2 id="taskTitle">让小机器人走到星星处</h2>
            <p id="taskHint">请按正确顺序点击指令</p>
        </div>

        <div class="task-container">
            <div class="task-title">🔢 按顺序排列指令</div>

            <div class="command-slots" id="commandSlots">
                <!-- 槽位由JS生成 -->
            </div>

            <div class="command-options" id="commandOptions">
                <!-- 选项由JS生成 -->
            </div>
        </div>

        <div class="buttons">
            <button class="action-btn btn-reset" onclick="resetLevel()">🔄 重置</button>
            <button class="action-btn btn-check" onclick="checkAnswer()">✅ 检查</button>
        </div>

        <div class="result-area" id="resultArea">
            <h3 id="resultTitle"></h3>
            <p id="resultMessage"></p>
            <div class="buttons">
                <button class="action-btn btn-reset" onclick="retry()">🔄 重试</button>
                <button class="action-btn btn-next" id="nextBtn" onclick="nextLevel()">下一关 →</button>
            </div>
        </div>

        <p class="instructions">
            观察题目要求，把指令按正确顺序排列起来！<br>
            点击指令选项填入槽位，再点击槽位可以取出
        </p>
    </div>

    <script>
        // 游戏状态
        let currentLevel = 0;
        let score = 0;
        let slots = [];
        let usedCommands = new Set();

        // 关卡数据
        const levels = [
            // Level 1: 简单3步
            {
                task: "让机器人向右走2格",
                solution: ['right', 'right'],
                commands: [
                    {id: 'right', icon: '➡️'},
                    {id: 'down', icon: '⬇️'},
                    {id: 'left', icon: '⬅️'},
                    {id: 'up', icon: '⬆️'}
                ]
            },
            // Level 2: 4步
            {
                task: "先向右，再向下，然后向右",
                solution: ['right', 'down', 'right'],
                commands: [
                    {id: 'down', icon: '⬇️'},
                    {id: 'right', icon: '➡️'},
                    {id: 'up', icon: '⬆️'},
                    {id: 'left', icon: '⬅️'}
                ]
            },
            // Level 3: 上下左右
            {
                task: "先向上2格，再向右1格",
                solution: ['up', 'up', 'right'],
                commands: [
                    {id: 'right', icon: '➡️'},
                    {id: 'up', icon: '⬆️'},
                    {id: 'down', icon: '⬇️'},
                    {id: 'left', icon: '⬅️'},
                    {id: 'left', icon: '⬅️'}
                ]
            },
            // Level 4: 5步
            {
                task: "右右，下下，左左",
                solution: ['right', 'right', 'down', 'down', 'left', 'left'],
                commands: [
                    {id: 'down', icon: '⬇️'},
                    {id: 'right', icon: '➡️'},
                    {id: 'left', icon: '⬅️'},
                    {id: 'up', icon: '⬆️'},
                    {id: 'right', icon: '➡️'},
                    {id: 'down', icon: '⬇️'},
                    {id: 'left', icon: '⬅️'}
                ]
            },
            // Level 5: 挑战
            {
                task: "上，右，下，右，下，左",
                solution: ['up', 'right', 'down', 'right', 'down', 'left'],
                commands: [
                    {id: 'right', icon: '➡️'},
                    {id: 'down', icon: '⬇️'},
                    {id: 'up', icon: '⬆️'},
                    {id: 'left', icon: '⬅️'},
                    {id: 'down', icon: '⬇️'},
                    {id: 'right', icon: '➡️'},
                    {id: 'left', icon: '⬅️'}
                ]
            }
        ];

        // 初始化
        function initGame() {
            loadLevel(currentLevel);
        }

        // 加载关卡
        function loadLevel(levelIndex) {
            const level = levels[levelIndex];

            // 重置状态
            slots = [];
            usedCommands = new Set();

            // 创建槽位
            const slotsContainer = document.getElementById('commandSlots');
            slotsContainer.innerHTML = '';
            for (let i = 0; i < level.solution.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.dataset.index = i;
                slot.onclick = () => removeFromSlot(i);
                slotsContainer.appendChild(slot);
            }

            // 创建指令选项
            const optionsContainer = document.getElementById('commandOptions');
            optionsContainer.innerHTML = '';
            // 随机打乱顺序
            const shuffled = [...level.commands].sort(() => Math.random() - 0.5);
            shuffled.forEach(cmd => {
                const btn = document.createElement('button');
                btn.className = 'command-btn';
                btn.textContent = cmd.icon;
                btn.dataset.id = cmd.id;
                btn.onclick = () => addToSlot(cmd.id);
                optionsContainer.appendChild(btn);
            });

            // 更新UI
            document.getElementById('level').textContent = levelIndex + 1;
            document.getElementById('taskTitle').textContent = level.task;
            document.getElementById('resultArea').classList.remove('show', 'success', 'fail');
        }

        // 添加指令到槽位
        function addToSlot(cmdId) {
            const level = levels[currentLevel];
            const emptyIndex = slots.findIndex(s => s === null);

            if (emptyIndex === -1) return; // 槽位已满

            slots[emptyIndex] = cmdId;
            usedCommands.add(cmdId);
            updateSlots();
        }

        // 从槽位移除指令
        function removeFromSlot(index) {
            if (slots[index] === null) return;

            const cmdId = slots[index];
            slots[index] = null;
            usedCommands.delete(cmdId);
            updateSlots();
        }

        // 更新槽位显示
        function updateSlots() {
            const level = levels[currentLevel];
            const slotElements = document.querySelectorAll('.slot');
            const cmdElements = document.querySelectorAll('.command-btn');

            // 更新槽位
            slotElements.forEach((slot, i) => {
                if (slots[i]) {
                    const cmd = level.commands.find(c => c.id === slots[i]);
                    slot.textContent = cmd.icon;
                    slot.classList.add('filled');
                } else {
                    slot.textContent = '';
                    slot.classList.remove('filled');
                }
            });

            // 更新选项状态
            cmdElements.forEach(btn => {
                const countUsed = slots.filter(s => s === btn.dataset.id).length;
                const totalAvailable = level.commands.filter(c => c.id === btn.dataset.id).length;
                if (countUsed >= totalAvailable) {
                    btn.classList.add('used');
                } else {
                    btn.classList.remove('used');
                }
            });
        }

        // 检查答案
        function checkAnswer() {
            const level = levels[currentLevel];

            // 检查是否填满
            if (slots.some(s => s === null)) {
                alert('请填满所有槽位！');
                return;
            }

            // 检查答案
            let correct = true;
            for (let i = 0; i < level.solution.length; i++) {
                if (slots[i] !== level.solution[i]) {
                    correct = false;
                    break;
                }
            }

            // 显示结果
            const resultArea = document.getElementById('resultArea');
            const resultTitle = document.getElementById('resultTitle');
            const resultMessage = document.getElementById('resultMessage');
            const nextBtn = document.getElementById('nextBtn');

            resultArea.classList.remove('success', 'fail');

            if (correct) {
                score += (5 - currentLevel) * 20;
                document.getElementById('score').textContent = score;
                resultArea.classList.add('success');
                resultTitle.textContent = '🎉 答对了！';
                resultMessage.textContent = `太棒了！获得 ${(5 - currentLevel) * 20} 分`;
                nextBtn.style.display = 'inline-block';
            } else {
                resultArea.classList.add('fail');
                resultTitle.textContent = '❌ 不对哦';
                resultMessage.textContent = '再想想，指令顺序对了吗？';
                nextBtn.style.display = 'none';
            }

            resultArea.classList.add('show');
        }

        // 重试
        function retry() {
            document.getElementById('resultArea').classList.remove('show', 'success', 'fail');
            loadLevel(currentLevel);
        }

        // 重置
        function resetLevel() {
            loadLevel(currentLevel);
        }

        // 下一关
        function nextLevel() {
            document.getElementById('resultArea').classList.remove('show', 'success', 'fail');
            if (currentLevel < levels.length - 1) {
                currentLevel++;
            } else {
                currentLevel = 0;
                alert('🎊 恭喜通关所有关卡！');
            }
            loadLevel(currentLevel);
        }

        initGame();
    </script>
<script src="../switch-controls.js"></script>
</body>
</html>
