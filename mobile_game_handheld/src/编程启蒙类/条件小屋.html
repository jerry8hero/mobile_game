<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>条件小屋</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 15px;
            user-select: none;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .info-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .info-item {
            background: rgba(255,255,255,0.25);
            padding: 8px 18px;
            border-radius: 20px;
            color: #fff;
            font-size: 1.1rem;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            max-width: 400px;
        }

        .scene {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            text-align: center;
        }

        .character-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin: 20px 0;
            min-height: 100px;
        }

        .character {
            font-size: 3rem;
            transition: all 0.3s;
        }

        .arrow {
            font-size: 2rem;
            color: #666;
        }

        .question {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .condition-display {
            font-size: 1.1rem;
            color: #e74c3c;
            font-weight: bold;
        }

        .options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .option-btn {
            padding: 15px 25px;
            font-size: 1.1rem;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            transform: scale(1.05);
            border-color: #f5576c;
        }

        .option-btn.correct {
            background: #27ae60;
            border-color: #27ae60;
            color: #fff;
        }

        .option-btn.wrong {
            background: #e74c3c;
            border-color: #e74c3c;
            color: #fff;
        }

        .result {
            display: none;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .result.show {
            display: block;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
        }

        .result.fail {
            background: #f8d7da;
            color: #721c24;
        }

        .buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button.action-btn {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 3px 15px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        button.action-btn:hover {
            transform: translateY(-2px);
        }

        .btn-next { background: #3498db; color: #fff; }
        .btn-retry { background: #f39c12; color: #fff; }

        .hint {
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
            text-align: center;
            background: rgba(255,255,255,0.15);
            padding: 12px;
            border-radius: 10px;
            max-width: 350px;
        }
    </style>
</head>
<body>
    <h1>🏠 条件小屋</h1>

    <div class="info-bar">
        <div class="info-item">关卡: <span id="level">1</span></div>
        <div class="info-item">得分: <span id="score">0</span></div>
    </div>

    <div class="game-area">
        <div class="scene">
            <h3 style="color:#333;margin-bottom:10px;">🤔 想想应该怎么做？</h3>

            <div class="question">
                <div class="question-text" id="questionText"></div>
                <div class="condition-display" id="conditionText"></div>
            </div>

            <div class="character-area">
                <div class="character" id="character">🧒</div>
                <div class="arrow">➡️</div>
                <div class="character" id="resultEmoji">❓</div>
            </div>

            <div class="options" id="options">
                <!-- 选项由JS生成 -->
            </div>

            <div class="result" id="result">
                <h3 id="resultTitle"></h3>
                <p id="resultMessage"></p>
            </div>
        </div>

        <div class="buttons">
            <button class="action-btn btn-retry" onclick="retry()">🔄 重试</button>
            <button class="action-btn btn-next" id="nextBtn" onclick="nextLevel()">下一关 →</button>
        </div>

        <p class="hint">
            如果满足条件，就这样做！<br>
            学习"如果...那么..."的逻辑
        </p>
    </div>

    <script>
        let currentLevel = 0;
        let score = 0;
        let answered = false;

        // 关卡数据
        const levels = [
            {
                question: "外面下雨了，出门要带什么？",
                condition: "如果 下雨",
                options: [
                    { text: "☂️ 雨伞", correct: true },
                    { text: "🕶️ 墨镜", correct: false },
                    { text: "🧴 防晒霜", correct: false }
                ],
                character: "🧒",
                resultEmoji: "☂️"
            },
            {
                question: "天黑了看不清路，应该做什么？",
                condition: "如果 天黑",
                options: [
                    { text: "🕯️ 点蜡烛", correct: true },
                    { text: "🕶️ 戴墨镜", correct: false },
                    { text: "🎂 吃蛋糕", correct: false }
                ],
                character: "🧒",
                resultEmoji: "🕯️"
            },
            {
                question: "肚子饿了想吃东西，去哪里？",
                condition: "如果 肚子饿",
                options: [
                    { text: "🍔 餐厅", correct: true },
                    { text: "🏥 医院", correct: false },
                    { text: "🏫 学校", correct: false }
                ],
                character: "🧒",
                resultEmoji: "🍔"
            },
            {
                question: "想买很多东西但钱不够？",
                condition: "如果 钱不够",
                options: [
                    { text: "💰 存钱", correct: true },
                    { text: "🛒 继续买", correct: false },
                    { text: "🏪 再拿一些", correct: false }
                ],
                character: "🧒",
                resultEmoji: "💰"
            },
            {
                question: "看到老师应该说什么？",
                condition: "如果 看到老师",
                options: [
                    { text: "👋 老师好", correct: true },
                    { text: "😴 睡觉", correct: false },
                    { text: "🎮 打游戏", correct: false }
                ],
                character: "🧒",
                resultEmoji: "👋"
            },
            {
                question: "迷路了应该找谁帮忙？",
                condition: "如果 迷路了",
                options: [
                    { text: "👮 警察叔叔", correct: true },
                    { text: "🐶 小狗", correct: false },
                    { text: "🎲 随便走", correct: false }
                ],
                character: "🧒",
                resultEmoji: "👮"
            },
            {
                question: "考试不会做怎么办？",
                condition: "如果 不会做",
                options: [
                    { text: "📝 认真思考", correct: true },
                    { text: "👀 偷看别人", correct: false },
                    { text: "📄 交白卷", correct: false }
                ],
                character: "🧒",
                resultEmoji: "📝"
            },
            {
                question: "发烧了身体不舒服？",
                condition: "如果 发烧了",
                options: [
                    { text: "🌡️ 看医生", correct: true },
                    { text: "🎮 继续玩", correct: false },
                    { text: "🍦 吃冰淇淋", correct: false }
                ],
                character: "🧒",
                resultEmoji: "🌡️"
            }
        ];

        function initGame() {
            loadLevel(currentLevel);
        }

        function loadLevel(levelIndex) {
            const level = levels[levelIndex];

            document.getElementById('questionText').textContent = level.question;
            document.getElementById('conditionText').textContent = level.condition;
            document.getElementById('character').textContent = level.character;
            document.getElementById('resultEmoji').textContent = "❓";
            document.getElementById('level').textContent = levelIndex + 1;

            // 生成选项
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            // 随机打乱选项
            const shuffledOptions = [...level.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(btn, opt.correct);
                optionsContainer.appendChild(btn);
            });

            // 重置状态
            answered = false;
            document.getElementById('result').classList.remove('show', 'success', 'fail');
            document.getElementById('nextBtn').style.display = 'none';
        }

        function selectOption(btn, isCorrect) {
            if (answered) return;
            answered = true;

            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            if (isCorrect) {
                btn.classList.add('correct');
                const level = levels[currentLevel];
                document.getElementById('resultEmoji').textContent = level.resultEmoji;

                score += 15;
                document.getElementById('score').textContent = score;

                const result = document.getElementById('result');
                result.classList.add('show', 'success');
                result.querySelector('h3').textContent = '🎉 答对了！';
                result.querySelector('p').textContent = '条件判断正确！';

                document.getElementById('nextBtn').style.display = 'inline-block';
            } else {
                btn.classList.add('wrong');

                // 显示正确答案
                const level = levels[currentLevel];
                buttons.forEach(b => {
                    const opt = level.options.find(o => o.text === b.textContent);
                    if (opt && opt.correct) {
                        b.classList.add('correct');
                    }
                });

                document.getElementById('resultEmoji').textContent = "❌";

                const result = document.getElementById('result');
                result.classList.add('show', 'fail');
                result.querySelector('h3').textContent = '❌ 不对哦';
                result.querySelector('p').textContent = '再想想条件是什么？';
            }
        }

        function retry() {
            loadLevel(currentLevel);
        }

        function nextLevel() {
            if (currentLevel < levels.length - 1) {
                currentLevel++;
            } else {
                currentLevel = 0;
                alert('🎊 恭喜完成所有关卡！得分: ' + score);
            }
            loadLevel(currentLevel);
        }

        initGame();
    </script>
<script src="../switch-controls.js"></script>
</body>
</html>
