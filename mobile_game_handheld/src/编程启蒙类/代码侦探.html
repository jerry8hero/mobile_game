<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码侦探</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #434343 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 15px;
            user-select: none;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .info-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .info-item {
            background: rgba(255,255,255,0.25);
            padding: 8px 18px;
            border-radius: 20px;
            color: #fff;
            font-size: 1.1rem;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            max-width: 450px;
            width: 100%;
        }

        .code-panel {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .code-title {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .code-content {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 1rem;
            line-height: 1.8;
            color: #d4d4d4;
            background: #2d2d2d;
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
        }

        .line {
            display: block;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .line:hover {
            background: #3d3d3d;
        }

        .line.error {
            background: #5a1d1d;
            border-left: 3px solid #f44336;
        }

        .line-number {
            color: #858585;
            margin-right: 15px;
            user-select: none;
        }

        .keyword { color: #569cd6; }
        .string { color: #ce9178; }
        .number { color: #b5cea8; }
        .comment { color: #6a9955; }
        .function { color: #dcdcaa; }
        .variable { color: #9cdcfe; }

        .hint-text {
            color: #f1c40f;
            font-size: 0.9rem;
            margin-top: 10px;
            padding: 10px;
            background: rgba(241, 196, 15, 0.1);
            border-radius: 8px;
        }

        .options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .option-btn {
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #444;
            border-radius: 10px;
            background: #2d2d2d;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Consolas', monospace;
        }

        .option-btn:hover {
            border-color: #3498db;
            transform: scale(1.02);
        }

        .option-btn.correct {
            background: #27ae60;
            border-color: #27ae60;
        }

        .option-btn.wrong {
            background: #e74c3c;
            border-color: #e74c3c;
        }

        .result {
            display: none;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            width: 100%;
        }

        .result.show { display: block; }
        .result.success { background: #27ae60; color: #fff; }
        .result.fail { background: #e74c3c; color: #fff; }

        .buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button.action-btn {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        button.action-btn:hover { transform: translateY(-2px); }
        .btn-next { background: #3498db; color: #fff; }
        .btn-retry { background: #f39c12; color: #fff; }

        .hint {
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>🔍 代码侦探</h1>

    <div class="info-bar">
        <div class="info-item">关卡: <span id="level">1</span></div>
        <div class="info-item">得分: <span id="score">0</span></div>
    </div>

    <div class="game-area">
        <div class="code-panel">
            <div class="code-title">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span style="margin-left:10px;">bug_finder.py</span>
            </div>

            <div class="code-content" id="codeContent">
                <!-- 代码由JS生成 -->
            </div>

            <div class="hint-text" id="hintText">
                提示：找找哪里有问题？
            </div>
        </div>

        <div class="options" id="options">
            <!-- 选项由JS生成 -->
        </div>

        <div class="result" id="result">
            <h3 id="resultTitle"></h3>
            <p id="resultMessage"></p>
        </div>

        <div class="buttons">
            <button class="action-btn btn-retry" onclick="retry()">🔄 重试</button>
            <button class="action-btn btn-next" id="nextBtn" onclick="nextLevel()">下一关 →</button>
        </div>

        <p class="hint">
            仔细看看代码哪里写错了？<br>
            当个小侦探，找出代码中的bug！
        </p>
    </div>

    <script>
        let currentLevel = 0;
        let score = 0;
        let answered = false;

        // 关卡数据
        const levels = [
            {
                code: [
                    { text: 'def say_hello():', num: 1 },
                    { text: '    print("你好")', num: 2 },
                    { text: 'say_hello()', num: 3 },
                    { text: 'print("完成")', num: 4 }
                ],
                errorLine: 3,
                hint: "这个函数被定义了，但有没有被调用？",
                question: "哪一行有错误？",
                options: [
                    { text: '第1行', correct: false },
                    { text: '第2行', correct: false },
                    { text: '第3行', correct: false },
                    { text: '没有错误', correct: true }
                ]
            },
            {
                code: [
                    { text: 'a = 10', num: 1 },
                    { text: 'b = 20', num: 2 },
                    { text: 'result = a + b', num: 3 },
                    { text: 'print(result)', num: 4 },
                    { text: 'print("和是: result")', num: 5 }
                ],
                errorLine: 5,
                hint: "字符串里的result会原样打印",
                question: "哪一行有问题？",
                options: [
                    { text: '第3行', correct: false },
                    { text: '第4行', correct: false },
                    { text: '第5行', correct: true },
                    { text: '没有错误', correct: false }
                ]
            },
            {
                code: [
                    { text: 'for i in range(5):', num: 1 },
                    { text: 'print(i)', num: 2 },
                    { text: 'print("完成")', num: 3 }
                ],
                errorLine: -1,
                hint: "这段代码看起来是正确的",
                question: "有错误吗？",
                options: [
                    { text: '第1行', correct: false },
                    { text: '第2行', correct: false },
                    { text: '没有错误', correct: true }
                ]
            },
            {
                code: [
                    { text: 'numbers = [1, 2, 3]', num: 1 },
                    { text: 'print(numbers[3])', num: 2 },
                    { text: 'print("结束")', num: 3 }
                ],
                errorLine: 2,
                hint: "列表从0开始索引",
                question: "哪一行有错误？",
                options: [
                    { text: '第1行', correct: false },
                    { text: '第2行', correct: true },
                    { text: '第3行', correct: false }
                ]
            },
            {
                code: [
                    { text: 'if score >= 60', num: 1 },
                    { text: '    print("及格")', num: 2 },
                    { text: 'else:', num: 3 },
                    { text: '    print("不及格")', num: 4 },
                    { text: 'print("游戏结束")', num: 5 }
                ],
                errorLine: 1,
                hint: "if语句后面需要加什么？",
                question: "哪一行有错误？",
                options: [
                    { text: '第1行', correct: true },
                    { text: '第3行', correct: false },
                    { text: '第5行', correct: false }
                ]
            },
            {
                code: [
                    { text: 'def add(a, b):', num: 1 },
                    { text: '    return a + b', num: 2 },
                    { text: 'result = add(5)', num: 3 },
                    { text: 'print(result)', num: 4 }
                ],
                errorLine: 3,
                hint: "函数需要几个参数？",
                question: "哪一行有错误？",
                options: [
                    { text: '第1行', correct: false },
                    { text: '第2行', correct: false },
                    { text: '第3行', correct: true }
                ]
            },
            {
                code: [
                    { text: 'name = "小明"', num: 1 },
                    { text: 'age = 8', num: 2 },
                    { text: 'print(name + age)', num: 3 }
                ],
                errorLine: 3,
                hint: "不同类型不能直接拼接",
                question: "哪一行有错误？",
                options: [
                    { text: '第1行', correct: false },
                    { text: '第2行', correct: false },
                    { text: '第3行', correct: true }
                ]
            }
        ];

        function initGame() {
            loadLevel(currentLevel);
        }

        function loadLevel(levelIndex) {
            const level = levels[levelIndex];

            document.getElementById('level').textContent = levelIndex + 1;
            document.getElementById('hintText').textContent = '提示：' + level.hint;

            // 生成代码显示
            const codeContent = document.getElementById('codeContent');
            codeContent.innerHTML = '';

            level.code.forEach((line, index) => {
                const lineElem = document.createElement('span');
                lineElem.className = 'line';
                if (index + 1 === level.errorLine) {
                    lineElem.classList.add('error');
                }
                lineElem.innerHTML = `<span class="line-number">${line.num}</span>${highlightSyntax(line.text)}`;
                codeContent.appendChild(lineElem);
            });

            // 生成选项
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            level.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(btn, opt.correct);
                optionsContainer.appendChild(btn);
            });

            // 重置状态
            answered = false;
            document.getElementById('result').classList.remove('show', 'success', 'fail');
            document.getElementById('nextBtn').style.display = 'none';
        }

        function highlightSyntax(code) {
            // 简单的高亮
            return code
                .replace(/\b(def|return|if|else|for|in|range|print)\b/g, '<span class="keyword">$1</span>')
                .replace(/"[^"]*"/g, '<span class="string">$&</span>')
                .replace(/\b\d+\b/g, '<span class="number">$&</span>')
                .replace(/#.*$/g, '<span class="comment">$&</span>');
        }

        function selectOption(btn, isCorrect) {
            if (answered) return;
            answered = true;

            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            const result = document.getElementById('result');

            if (isCorrect) {
                btn.classList.add('correct');
                score += 20;
                document.getElementById('score').textContent = score;

                result.classList.add('show', 'success');
                document.getElementById('resultTitle').textContent = '🎉 找对了！';
                document.getElementById('resultMessage').textContent = '你发现了bug！';

                document.getElementById('nextBtn').style.display = 'inline-block';
            } else {
                btn.classList.add('wrong');

                // 显示正确答案
                const level = levels[currentLevel];
                buttons.forEach(b => {
                    const opt = level.options.find(o => o.text === b.textContent);
                    if (opt && opt.correct) {
                        b.classList.add('correct');
                    }
                });

                result.classList.add('show', 'fail');
                document.getElementById('resultTitle').textContent = '❌ 不对哦';
                document.getElementById('resultMessage').textContent = '再仔细看看代码！';
            }
        }

        function retry() {
            loadLevel(currentLevel);
        }

        function nextLevel() {
            if (currentLevel < levels.length - 1) {
                currentLevel++;
            } else {
                currentLevel = 0;
                alert('🎊 恭喜完成所有关卡！得分: ' + score);
            }
            loadLevel(currentLevel);
        }

        initGame();
    </script>
<script src="../switch-controls.js"></script>
<script src="../performance.js"></script>
<script src="../loading.js"></script>
<script src="../switch-controls.js"></script>
</body>
</html>
