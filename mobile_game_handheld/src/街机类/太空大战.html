<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空大战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }
        #game {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            position: relative;
            background: linear-gradient(180deg, #000011 0%, #000033 100%);
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            color: #fff;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 10;
        }
        #gameOverScreen { display: none; }
        h1 { color: #4ecdc4; margin-bottom: 20px; font-size: 1.8rem; }
        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn:hover { background: #ff6b6b; }
    </style>
</head>
<body>
    <div id="game">
        <canvas id="canvas"></canvas>
        <div id="ui">
            <div>得分: <span id="score">0</span></div>
            <div>生命: <span id="lives">❤️❤️❤️</span></div>
        </div>
        <div id="startScreen">
            <h1>🚀 太空大战</h1>
            <button class="btn" onclick="startGame()">开始游戏</button>
            <p style="margin-top:15px;color:#aaa">← → 移动 | A/空格 发射</p>
        </div>
        <div id="gameOverScreen">
            <h1>💀 游戏结束</h1>
            <p>得分: <span id="finalScore">0</span></p>
            <button class="btn" onclick="restartGame()" style="margin-top:20px">再来一次</button>
        </div>
    </div>
    <script src="../gamepad-helper.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 480;
        canvas.height = 640;

        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let playerX = 220;
        let bullets = [];
        let enemies = [];
        let stars = [];
        let lastShot = 0;

        // 初始化星星背景
        for (let i = 0; i < 50; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                speed: Math.random() * 2 + 1
            });
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            score = 0;
            lives = 3;
            playerX = 220;
            bullets = [];
            enemies = [];
            updateUI();
            gameLoop();
        }

        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            startGame();
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = '❤️'.repeat(lives);
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function spawnEnemy() {
            if (Math.random() < 0.03) {
                enemies.push({
                    x: Math.random() * (canvas.width - 40),
                    y: -40,
                    type: Math.floor(Math.random() * 3)
                });
            }
        }

        function update() {
            if (!gameRunning) return;

            // 移动星星
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });

            // 移动子弹
            bullets.forEach((bullet, i) => {
                bullet.y -= 8;
                if (bullet.y < 0) bullets.splice(i, 1);
            });

            // 移动敌人
            enemies.forEach((enemy, i) => {
                enemy.y += 3;
                if (enemy.y > canvas.height) {
                    enemies.splice(i, 1);
                    return;
                }

                // 碰撞检测
                bullets.forEach((bullet, j) => {
                    if (bullet.x < enemy.x + 35 && bullet.x + 10 > enemy.x &&
                        bullet.y < enemy.y + 35 && bullet.y + 20 > enemy.y) {
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 10;
                    }
                });

                // 撞到玩家
                if (playerX < enemy.x + 35 && playerX + 40 > enemy.x &&
                    500 < enemy.y + 35 && 500 + 40 > enemy.y) {
                    enemies.splice(i, 1);
                    lives--;
                    if (lives <= 0) gameOver();
                }
            });

            spawnEnemy();
            updateUI();
        }

        function draw() {
            ctx.fillStyle = '#000011';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 星星
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                ctx.fillRect(star.x, star.y, 2, 2);
            });

            // 子弹
            ctx.fillStyle = '#4ecdc4';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, 10, 20);
            });

            // 敌人
            const enemyIcons = ['🛸', '🚀', '👾'];
            ctx.font = '30px Arial';
            enemies.forEach(enemy => {
                ctx.fillText(enemyIcons[enemy.type], enemy.x, enemy.y + 30);
            });

            // 玩家
            ctx.font = '40px Arial';
            ctx.fillText('🚀', playerX, 530);
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function shoot() {
            const now = Date.now();
            if (now - lastShot > 200) {
                bullets.push({ x: playerX + 15, y: 480 });
                lastShot = now;
            }
        }

        // 键盘控制
        document.addEventListener('keydown', e => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft' && playerX > 0) playerX -= 20;
            if (e.key === 'ArrowRight' && playerX < canvas.width - 40) playerX += 20;
            if (e.key === ' ' || e.key === 'a') shoot();
        });

        // 触摸控制
        canvas.addEventListener('touchstart', e => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            if (x < canvas.width / 2) playerX = Math.max(0, playerX - 30);
            else playerX = Math.min(canvas.width - 40, playerX + 30);
        });
        canvas.addEventListener('touchend', shoot);

        // 手柄支持
        if (window.GamepadHelper) {
            GamepadHelper.on('onButtonDown', btn => {
                if (btn === 'left' && playerX > 0) playerX -= 20;
                if (btn === 'right' && playerX < canvas.width - 40) playerX += 20;
                if (btn === 'a') shoot();
            });
        }

        draw();
    </script>
</body>
</html>
